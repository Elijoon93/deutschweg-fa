<script>

const GATES=[
 ['published','انتشار HTTPS واقعی','دامنه منتشرشده باید HTTPS عمومی باشد.','external'],['secure','بستر امن','Secure Context برای PWA و صوت.','auto'],['storage','LocalStorage','نوشتن، خواندن و حذف آزمایشی.','auto'],['indexeddb','IndexedDB','Roundtrip مستقل پایگاه داده.','auto'],['manifest','Manifest و آیکون‌ها','Manifest و آیکون‌های نصب قابل دریافت باشند.','auto'],['serviceworker','Service Worker','Worker ثبت و آماده شود.','auto'],['cache','Cache آفلاین','Cache جاری و فایل‌های اصلی موجود باشد.','auto'],['metadata','همسانی نسخه','Version، Manifest و Worker برابر X16.5.1 باشند.','auto'],['migration','حفظ اطلاعات','کلیدهای داده و مهاجرت قبلی حفظ شوند.','auto'],['sponsor','عضویت اجباری','کانال، کلید سازگار و تأخیر ۲۶ ثانیه حفظ شود.','auto'],['competency','موتور شایستگی','۵۴ گره و ۱۸ سؤال تشخیصی قابل دریافت باشد.','auto'],['backup','ساختار Backup','State قابل Serialize و Parse باشد.','auto'],['tts','TTS آلمانی','صدای آلمانی روی دستگاه شنیده شود.','manual'],['microphone','میکروفون و ضبط','مجوز و ضبط واقعی تأیید شود.','manual'],['speech','تشخیص گفتار','عبارت Guten Tag تشخیص داده شود.','manual'],['offline','Reload آفلاین','پس از بارگذاری، بدون شبکه باز شود.','manual'],['install','نصب PWA','در حالت Standalone اجرا شود.','manual'],['restore','Backup/Restore','فایل خروجی با موفقیت بازیابی شود.','manual'],['usability','آزمون A1/A2','حداقل دو زبان‌آموز بدون راهنما مسیر را کامل کنند.','human'],['language','بازبینی A1 تا C2','نمونه‌های همه شش سطح بازبینی شوند.','human']];

function render(){const app=q('#app');if(!sponsorAccepted()){app.innerHTML=`<div class="sponsor-block"><h1>عضویت اجباری تأیید نشده است</h1><p>ابتدا از صفحه اصلی، عضویت کانال و شمارش ۲۶ ثانیه‌ای را تکمیل کنید.</p><a href="./index.html">بازگشت به برنامه</a></div>`;return}const d=decision(),auto=GATES.filter(x=>x[3]==='auto'||x[3]==='external'),manual=GATES.filter(x=>x[3]==='manual'),human=GATES.filter(x=>x[3]==='human');app.innerHTML=`<main class="wrap"><header class="top"><div><h1>مرکز پذیرش نهایی</h1><p>X16.5.1 · ثبت شواهد واقعی، کنترل نقص و تصمیم انتشار</p></div><a class="back" href="./index.html">بازگشت به برنامه</a></header><section class="hero"><div><span class="pill">Final Acceptance Candidate</span><h2>${d.final?'شرایط ارتقا ثبت شده است':'نسخه هنوز Final Stable نیست'}</h2><p>${d.final?'گزارش پذیرش را خروجی بگیرید و اسکریپت ارتقا را اجرا کنید.':'تا عبور تمام گیت‌ها و بسته‌شدن نقص‌های Critical/High، تصمیم انتشار HOLD است.'}</p></div><div class="ring" style="--p:${d.pct}"><div><b>${d.pct}٪</b><span>${d.pass}/${d.total} PASS</span></div></div></section><div class="metrics"><div class="metric"><b>${d.pass}/${d.total}</b><span>گیت PASS</span></div><div class="metric"><b>${d.pending.length}</b><span>گیت باز</span></div><div class="metric"><b>${d.failed.length}</b><span>گیت FAIL</span></div><div class="metric"><b>${d.blockers.length}</b><span>Critical/High باز</span></div></div><div class="actions"><button class="primary" data-act="auto">اجرای کنترل‌های خودکار</button><button data-act="defect">ثبت/مدیریت نقص</button><button data-act="export">خروجی پذیرش</button><label>ورود گزارش<input id="importFile" type="file" accept=".json,application/json"></label><button data-act="reset">بازنشانی گیت‌ها</button></div><section class="panel"><h3>کنترل‌های ساختاری و انتشار</h3><div class="gates">${auto.map(gateCard).join('')}</div></section><section class="panel"><h3>صوت، دستگاه و PWA</h3><div class="gates">${manual.map(gateCard).join('')}</div></section><section class="panel"><h3>پ function saveEvidence(id,status){const tester=q('#tester').value.trim(),device=q('#device').value.trim(),browser=q('#browser').value.trim(),notes=q('#notes').value.trim(),participants=Number(q('#participants')?.value||0),levels=[...document.querySelectorAll('[data-level]:checked')].map(x=>x.dataset.level);if(tester.length<2)return alert('نام آزمونگر را ثبت کنید.');if(device.length<3)return alert('دستگاه را ثبت کنید.');if(notes.length<8)return alert('شرح نتیجه باید دقیق‌تر باشد.');if(id==='usability'&&status==='pass'&&participants<2)return alert('برای PASS حداقل دو شرکت‌کننده لازم است.');if(id==='language'&&status==='pass'&&!['A1','A2','B1','B2','C1','C2'].every(l=>levels.includes(l)))return alert('برای PASS باید A1 تا C2 بازبینی شده باشند.');const e={id:'ev-'+Date.now(),gate:id,status,tester,device,browser,notes,participants:id==='usability'?participants:undefined,levels:id==='language'?levels:undefined,testedAt:new Date().toISOString(),origin:location.origin,userAgent:navigator.userAgent};S.evidence.unshift(e);setGate(id,status,status==='pass'?'PASS با شاهد ثبت شد.':'FAIL با شاهد ثبت شد.',e.id);S.history.unshift({at:e.testedAt,type:'evidence',gate:id,status});closeModal();save()}
async function idbProbe(){return new Promise((res,rej)=>{if(!indexedDB)return rej(Error('IndexedDB unavailable'));const n='dw-x1651-probe',r=indexedDB.open(n,1);r.onupgradeneeded=()=>r.result.createObjectStore('s');r.onerror=()=>rej(r.error);r.onsuccess=()=>{const db=r.result,t=db.transaction('s','readwrite'),s=t.objectStore('s'),v='v'+Date.now();s.put(v,'k');t.oncomplete=()=>{const t2=db.transaction('s'),g=t2.objectStore('s').get('k');g.onsuccess=()=>{const ok=g.result===v;db.close();indexedDB.deleteDatabase(n);ok?res():rej(Error('mismatch'))};g.onerror=()=>rej(g.error)}}})}
async function auto(){const publicHttps=location.protocol==='https:'&&!['localhost','127.0.0.1'].includes(location.hostname);setGate('published',publicHttps?'pass':'pending',publicHttps?`HTTPS عمومی: ${location.origin}`:'دامنه HTTPS عمومی هنوز ثبت نشده است.');setGate('secure',isSecureContext?'pass':'fail',isSecureContext?'Secure Context فعال است.':'Secure Context فعال نیست.');try{const k='__dw_acc',v='v'+Date.now();localStorage.setItem(k,v);const ok=localStorage.getItem(k)===v;localStorage.removeItem(k);setGate('storage',ok?'pass':'fail',ok?'Roundtrip موفق بود.':'عدم تطابق.')}catch(e){setGate('storage','fail',e.message)}try{await idbProbe();setGate('indexeddb','pass','Roundtrip موفق بود.')}catch(e){setGate('indexeddb','fail',e.message)}try{const m=await fetch('./manifest.webmanifest',{cache:'no-store'}).then(r=>r.json()),icons=await Promise.all((m.icons||[]).map(x=>fetch(x.src).then(r=>r.ok)));setGate('manifest',icons.length>=2&&icons.every(Boolean)?'pass':'fail',`آیکون‌های قابل دریافت: ${icons.filter(Boolean).length}/${icons.length}`)}catch(e){setGate('manifest','fail',e.message)}try{if(!('serviceWorker'in navigator))throw Error('Service Worker API unavailable');const reg=await navigator.serviceWorker.register('./sw.js');await navigator.serviceWorker.ready;setGate('serviceworker',reg.active||reg.waiting?'pass':'verify','Worker ثبت شد.')}catch(e){setGate('serviceworker','fail',e.message)}try{const keys=await caches.keys(),key=keys.find(x=>x.includes('x16-5-1'));setGate('cache',key?'pass':'fail',key||'Cache جاری پیدا نشد.')}catch(e){setGate('cache','fail',e.message)}try{const [v,m,sw]=await Promise.all([fetch('./version.json',{cache:'no-store'}).then(r=>r.json()),fetch('./manifest.webmanifest',{cache:'no-store'}).then(r=>r.json()),fetch('./sw.js',{cache:'no-store'}).then(r=>r.text())]);const ok=v.version===VERSION&&String(m.name).includes('X16.5.1')&&sw.includes("version:'16.5.1'");setGate('metadata',ok?'pass':'fail',ok?'نسخه‌ها همسان هستند.':'ناهمسانی نسخه.')}catch(e){setGate('metadata','fail',e.message)}setGate('migration',MAIN_STATE==='deutschweg_x14_6_integrated_state'&&DB==='deutschweg-x14-6'?'pass':'fail','کلیدهای داده قبلی حفظ شده‌اند.');setGate('sponsor',sponsorAccepted()&&SPONSOR_DELAY===26?'pass':'fail',sponsorAccepted()?'عضویت محلی و تأخیر ۲۶ ثانیه حفظ شده است.':'عضویت محلی تأیید نشده است.');try{const [g,b]=await Promise.all([fetch('./CEFR_COMPETENCY_GRAPH_X16_5.json').then(r=>r.json()),fetch('./DIAGNOSTIC_BANK_X16_5.json').then(r=>r.json())]);setGate('competency',g.nodeCount===54&&b.items?.length===18?'pass':'fail',`${g.nodeCount||0} گره · ${b.items?.length||0} سؤال`)}catch(e){setGate('competency','fail',e.message)}try{const raw=localStorage.getItem(MAIN_STATE),obj=raw?JSON.parse(raw):{};JSON.parse(JSON.stringify(obj));setGate('backup','pass','State قابل Serialize/Parse است.')}catch(e){setGate('backup','fail',e.message)}S.history.unshift({at:new Date().toISOString(),type:'automatic',origin:location.origin});save()}
function tts(){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance('Guten Tag. Willkommen bei DeutschWeg.');u.lang='de-DE';u.rate=.85;speechSynthesis.speak(u);setGate('tts','verify','صوت پخش شد؛ شنیده‌شدن را با شاهد ثبت کنید.');save()}catch(e){setGate('tts','fail',e.message);save()}}
async function mic(){try{const stream=await navigator.mediaDevices.getUserMedia({audio:true}),chunks=[],r=new MediaRecorder(stream);r.ondataavailable=e=>e.data.size&&chunks.push(e.data);const done=new Promise((res,rej)=>{r.onstop=()=>res(new Blob(chunks));r.onerror=e=>rej(e.error)});r.start();setTimeout(()=>r.stop(),1500);const blob=await done;stream.getTracks().forEach(x=>x.stop());setGate('microphone',blob.size?'verify':'fail',blob.size?`Blob صوتی ${blob.size} بایت؛ کیفیت را با شاهد تأیید کنید.`:'Blob خالی.');save()}catch(e){setGate('microphone','fail',e.message);save()}}
function speech(){const R=window.SpeechRecognition||window.webkitSpeechRecognition;if(!R){setGate('speech','fail','Speech Recognition موجود نیست.');save();return}const r=new R();r.lang='de-DE';r.onresult=e=>{const t=e.results[0][0].transcript,ok=/guten\s+tag/i.test(t);setGate('speech',ok?'pass':'fail',`تشخیص: ${t}`);save()};r.onerror=e=>{setGate('speech','fail',e.error);save()};r.start();setGate('speech','verify','در حال گوش‌دادن؛ Guten Tag را بگویید.');save()}
function defectDialog(){modal('ثبت و مدیریت نقص',`<div class="form"><label>عنوان نقص</label><input id="dTitle"><label>شدت</label><select id="dSeverity"><option value="critical">Critical</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select><label>گیت مرتبط</label><select id="dGate"><option value="general">عمومی</option>${GATES.map(x=>`<option value="${x[0]}">${x[1]}</option>`).join('')}</select><label>شرح و روش بازتولید</label><textarea id="dNotes"></textarea><button id="addDefect">ثبت نقص</button></div><div class="defects" style="margin-top:14px">${S.defects.map(x=>`<article class="defect"><span class="sev ${x.severity}">${x.severity.toUpperCase()}</span><div><b>${esc(x.title)}</b><small>${esc(x.notes)}<br>${esc(x.gate)} · ${x.status==='closed'?'بسته':'باز'}</small></div><button data-toggle="${x.id}">${x.status==='closed'?'بازگشایی':'بستن'}</button></article>`).join('')||'<p class="note">نقصی ثبت نشده است.</p>'}</div>`);q('#addDefect').onclick=addDefect;document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>toggleDefect(b.dataset.toggle))}
function addDefect(){const title=q('#dTitle').value.trim(),severity=q('#dSeverity').value,gate=q('#dGate').value,notes=q('#dNotes').value.trim();if(title.length<4||notes.length<8)return alert('عنوان و شرح را دقیق‌تر ثبت کنید.');S.defects.unshift({id:'def-'+Date.now(),title,severity,gate,notes,status:'open',createdAt:new Date().toISOString()});save();defectDialog()}
function toggleDefect(id){const d=S.defects.find(x=>x.id===id);if(d){d.status=d.status==='closed'?'open':'closed';d.closedAt=d.status==='closed'?new Date().toISOString():null;save();defectDialog()}}
function exportReport(){const d=decision(),payload={schema:'deutschweg-acceptance-1',product:'DeutschWeg',version:VERSION,channel:'final-acceptance-candidate',status:d.final?'FINAL_ELIGIBLE':'HOLD',promotionAllowed:d.final,exportedAt:new Date().toISOString(),device:{origin:location.origin,userAgent:navigator.userAgent,platform:navigator.platform,secureContext:isSecureContext,standalone:matchMedia('(display-mode:standalone)').matches},lockedAssumptions:{storageKey:MAIN_STATE,indexedDB:DB,sponsorKey:SPONSOR_KEY,sponsorDelaySeconds:SPONSOR_DELAY,serverMembershipVerification:false,accountLogin:false},decision:d,tests:S.tests,evidence:S.evidence,defects:S.defects,history:S.history.slice(0,30)},a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}));a.download=`DeutschWeg_X16_5_1_Acceptance_${new Date().toISOString().slice(0,10)}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),700)}
function importReport(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{const p=JSON.parse(r.result);if(p.product!=='DeutschWeg'||p.version!==VERSION||!p.tests||!Array.isArray(p.evidence)||!Array.isArray(p.defects))throw Error('گزارش معتبر X16.5.1 نیست.');S.tests=p.tests;S.evidence=p.evidence;S.defects=p.defects;S.history=Array.isArray(p.history)?p.history:[];save()}catch(e){alert(e.message)}};r.readAsText(file)}
function reset(){if(confirm('نتایج گیت‌ها و شواهد پاک شوند؟')){const defects=S.defects;S=initial();S.defects=defects;save()}}
function act(a){if(a==='auto')auto();if(a==='tts')tts();if(a==='mic')mic();if(a==='speech')speech();if(a==='defect')defectDialog();if(a==='export')exportReport();if(a==='reset')reset()}
render();
})();
</script></body></html>
