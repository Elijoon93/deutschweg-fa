function stageForPack(id){const p=topicById(id);if(!p)return'A1.1';const list=packsByLevel(p.level),i=Math.max(0,list.findIndex(x=>x.id===id));if(p.level==='A1')return i<Math.ceil(list.length/2)?'A1.1':'A1.2';if(p.level==='A2')return i<Math.ceil(list.length/2)?'A2.1':'A2.2';if(p.level==='B1')return i<Math.ceil(list.length/2)?'B1.1':'B1.2';if(p.level==='B2')return i<Math.ceil(list.length/2)?'B2.1':'B2.2';return'C1'}
function stagePacks(stage){return PACKS.filter(p=>stageForPack(p.id)===stage)}
function stageProgress(stage){const ps=stagePacks(stage);if(!ps.length)return 0;const scores=ps.map(p=>S.mastery.topics[p.id]?.score||0);return Math.round(scores.reduce((a,b)=>a+b,0)/ps.length)}
function cefrIndex(level){return LEVELS.indexOf(level)}
function stageUnlocked(index){if(index===0)return true;const current=cefrIndex(S.profile.current);const stageCefr=cefrIndex(COURSE_STAGES[index].cefr);if(stageCefr<=current)return true;return stageProgress(COURSE_STAGES[index-1].id)>=55}
function renderCourseMap(){return`<div class="notice">نقشه دوره از A1.1 تا C1 ساخته شده است. هر مرحله شامل Unit، Practice، Review و Checkpoint است. بخش «سلامت روزمره» فقط زبان مراجعه و ارتباط را پوشش می‌دهد و تشخیص، درمان یا تعیین دوز ارائه نمی‌کند.</div><div class="section timeline">${COURSE_STAGES.map((st,i)=>{const unlocked=stageUnlocked(i),progress=stageProgress(st.id),packs=stagePacks(st.id);return`<article class="panel"><div class="row" style="justify-content:space-between"><div><span class="pill ${unlocked?'ok':'warn'}">${unlocked?'باز':'قفل'}</span><h3>${st.label} — ${st.title}</h3><p>${packs.length} واحد آموزشی · پیشرفت ${fa(progress)}٪</p></div><div style="min-width:150px"><div class="bar"><span style="width:${progress}%"></span></div></div></div><div class="topic-grid section">${packs.map(p=>`<article class="topic-card"><span class="pill">${p.level} · Unit</span><h3>${esc(p.title)}</h3><p>${esc(p.description)}</p><button class="btn secondary small" data-course-unit="${p.id}" ${unlocked?'':'disabled'}>${unlocked?'شروع واحد':'نیازمند مرحله قبل'}</button></article>`).join('')||'<div class="empty">محتوای این مرحله هنوز تکمیل نشده است.</div>'}</div></article>`}).join('')}</div>`}
function courseUnit(id){if(!topicById(id))return;S.course.lastUnit=id;safeSet(KEY,JSON.stringify(S));const existing=S.plan.sessions.find(x=>!x.done&&x.topic===id);if(existing)return sessionModal(existing.id);const sid=`course-${Date.now()}`;S.plan.sessions.unshift({id:sid,index:1,date:today(),topic:id,skill:weakness(),minutes:S.profile.minutes,done:false,step:0,scores:{},createdAt:now(),source:'course-map'});S.plan.sessions.forEach((x,i)=>x.index=i+1);safeSet(KEY,JSON.stringify(S));sessionModal(sid)}
function exerciseCenter(){openOverlay(dialog('Exercise Engine','۱۵ نوع تمرین عملیاتی و متصل به Mastery',`<div class="notice">هر پاسخ، زمان پاسخ، دفعات تلاش، دقت، لغزش و اطمینان را در سطح مفهوم ثبت می‌کند.</div><div class="tool-grid section">${EXERCISE_TYPES.map(x=>`<article class="tool-card"><span class="pill">Operational</span><h3>${x[1]}</h3><p>${x[0]}</p><button class="btn secondary small" data-exercise-type="${x[0]}">شروع تمرین</button></article>`).join('')}</div>`,'<button class="btn secondary" data-action="close">بستن</button>'))}
function exercisePack(){const preferred=goalTopics().map(topicById).filter(Boolean),pool=preferred.length?preferred:PACKS;return pool[Math.floor(Math.random()*pool.length)]}
function shuffled(a){return[...a].sort(()=>Math.random()-.5)}
function startExercise(type){const p=exercisePack(),w=p.words[Math.floor(Math.random()*p.words.length)],started=Date.now();runtime.exercise={type,pack:p.id,word:w.id,started,target:'',concept:`${p.id}:${type}`};let body='',target='';if(type==='mcq'){const opts=shuffled([w.fa,...PACKS.filter(x=>x.id!==p.id).slice(0,3).map(x=>x.words[0].fa)]);target=w.fa;body=`<h2 lang="de" dir="ltr">${esc(w.de)}</h2><p>معنی درست را انتخاب کنید.</p><div class="choices">${opts.map(o=>`<button class="choice" data-exercise-answer="${esc(o)}">${esc(o)}</button>`).join('')}</div>`}else if(type==='matching'){const pairs=shuffled(p.words.slice(0,4));target=pairs.map(x=>x.de+'='+x.fa).join('|');body=`<p>هر واژه را با معنی درست جفت کنید؛ پاسخ را به شکل <b>واژه=معنی</b> و با | جدا کنید.</p><div class="grid2">${pairs.map(x=>`<article class="panel"><b>${esc(x.de)}</b></article>`).join('')}</div><textarea id="exerciseInput"></textarea><button class="btn primary section" data-action="exercise-check">بررسی</button>`}else if(type==='ordering'){target=p.speaking;body=`<p>کلمات را به جمله درست تبدیل کنید.</p><div class="chips">${shuffled(p.speaking.split(' ')).map(x=>`<button>${esc(x)}</button>`).join('')}</div><textarea id="exerciseInput"></textarea><button class="btn primary section" data-action="exercise-check">بررسی</button>`}else if(type==='dictation'){target=p.listening;body=`<button class="btn primary" data-speak="${esc(p.listening)}">پخش جمله</button><textarea id="exerciseInput" class="section"></textarea><button class="btn primary section" data-action="exercise-check">بررسی</button>`}else if(type==='audio-choice'){const opts=shuffled([p.title,...PACKS.filter(x=>x.id!==p.id).slice(0,3).map(x=>x.title)]);target=p.title;body=`<button class="btn primary" data-speak="${esc(p.listening)}">پخش</button><p>موضوع جمله چیست؟</p><div class="choices">${opts.map(o=>`<button class="choice" data-exercise-answer="${esc(o)}">${esc(o)}</button>`).join('')}</div>`}else if(type==='gap'||type==='grammar'){target=p.grammar.options[p.grammar.answer];body=`<h3>${esc(p.grammar.prompt)}</h3><div class="choices">${p.grammar.options.map(o=>`<button class="choice" data-exercise-answer="${esc(o)}">${esc(o)}</button>`).join('')}</div>`}else if(type==='translation'){target=p.speaking;body=`<p>این مفهوم را به آلمانی بیان کنید:</p><div class="notice">${esc(p.title)} — ${esc(p.description)}</div><textarea id="exerciseInput"></textarea><button class="btn primary section" data-action="exercise-check">بررسی واژگانی</button>`}else if(type==='dialogue'){target=p.speaking;body=`<p>پاسخ مناسب را بازسازی کنید.</p><div class="notice">A: Guten Tag. Wie kann ich Ihnen helfen?<br>B: …</div><textarea id="exerciseInput"></textarea><button class="btn primary section" data-action="exercise-check">بررسی</button>`}else if(type==='speaking'||type==='shadowing'){target=p.speaking;body=`<h3 lang="de" dir="ltr">${esc(p.speaking)}</h3><div class="row"><button class="btn primary" data-speak="${esc(p.speaking)}">شنیدن</button><button class="btn secondary" data-action="exercise-speech" data-target="${esc(p.speaking)}">گفتن و بررسی</button><button class="btn secondary" data-action="record-audio">ضبط صدا</button></div><div id="exerciseFeedback" class="notice section">نتیجه اینجا ثبت می‌شود.</div><audio id="audioPlayback" class="hide section" controls></audio>`}else if(type==='reading'){target=p.title;body=`<p lang="de" dir="ltr" style="font-size:18px;line-height:2">${esc(p.reading.de)}</p><p>موضوع متن چیست؟</p><div class="choices">${shuffled([p.title,...PACKS.filter(x=>x.id!==p.id).slice(0,3).map(x=>x.title)]).map(o=>`<button class="choice" data-exercise-answer="${esc(o)}">${esc(o)}</button>`).join('')}</div>`}else if(type==='summary'){target=p.reading.de;body=`<p lang="de" dir="ltr">${esc(p.reading.de)}</p><p>متن را در یک یا دو جمله آلمانی خلاصه کنید.</p><textarea id="exerciseInput"></textarea><button class="btn primary section" data-action="exercise-check">ثبت و ارزیابی ساختاری</button>`}else if(type==='correction'){const wrong=p.speaking.replace(/\b(ist|bin|sind|habe|hat)\b/,'XXX');target=p.speaking;body=`<p>خطا را اصلاح کنید:</p><h3 lang="de" dir="ltr">${esc(wrong)}</h3><textarea id="exerciseInput"></textarea><button class="btn primary section" data-action="exercise-check">بررسی</button>`}else{target=p.quiz.options[p.quiz.answer];body=`<p>در این موقعیت بهترین پاسخ کدام است؟</p><div class="notice">${esc(p.description)}</div><div class="choices">${p.quiz.options.map(o=>`<button class="choice" data-exercise-answer="${esc(o)}">${esc(o)}</button>`).join('')}</div>`}runtime.exercise.target=target;openOverlay(dialog(EXERCISE_TYPES.find(x=>x[0]===type)?.[1]||'تمرین',`${p.level} · ${p.title}`,`<article class="panel">${body}<div id="exerciseResult" class="section"></div></article>`,'<button class="btn secondary" data-action="exercise-engine">بازگشت به تمرین‌ها</button>'))}
function recordAttempt(score,answer='',confidence=3){const e=runtime.exercise;if(!e)return;const rt=Math.max(250,Date.now()-e.started),concept=e.concept,m=S.mastery.concepts[concept]||{accuracy:0,responseTime:0,attempts:0,lastSeen:null,stability:0,difficulty:50,lapses:0,confidence:0};const attempts=m.attempts+1,accuracy=Math.round((m.accuracy*m.attempts+score)/attempts);S.mastery.concepts[concept]={accuracy,responseTime:Math.round((m.responseTime*m.attempts+rt)/attempts),attempts,lastSeen:now(),stability:Math.min(100,Math.round(m.stability*.75+score*.25)),difficulty:Math.max(1,Math.min(100,Math.round(m.difficulty+(score<60?6:-3)))),lapses:m.lapses+(score<60?1:0),confidence:Math.round((m.confidence*m.attempts+confidence)/attempts)};S.attempts.unshift({id:crypto.randomUUID?.()||String(Date.now()),type:e.type,topic:e.pack,concept,score,responseTime:rt,answer,date:now()});S.attempts=S.attempts.slice(0,1000);if(score<60)S.errors.unshift({id:Date.now(),note:`${e.type}: ${topicById(e.pack)?.title||e.pack}`,resolved:false,date:now(),topic:e.pack});record('exercise',`${EXERCISE_TYPES.find(x=>x[0]===e.type)?.[1]||e.type} — ${score}٪`,4,{score});safeSet(KEY,JSON.stringify(S));return score}
function gradeExercise(answer){const e=runtime.exercise;if(!e)return;const score=similarity(answer,e.target);recordAttempt(score,answer);const f=$('#exerciseFeedback')||$('#exerciseResult');if(f)f.innerHTML=`<div class="notice">${score>=80?'عالی':score>=60?'قابل قبول':'نیازمند مرور'} — امتیاز ${fa(score)}٪<br><span lang="de" dir="ltr">${esc(e.target)}</span></div>`}

function renderProgress(){const done=completed(),minutes=S.activities.reduce((a,x)=>a+(x.minutes||0),0);return`${pageHead('پیشرفت','ارزیابی بر اساس فعالیت ثبت‌شده، نه عدد تزئینی.')}<div class="kpis"><div class="kpi"><b>${fa(done)}</b><span>جلسه تکمیل‌شده</span></div><div class="kpi"><b>${fa(minutes)}</b><span>دقیقه ثبت‌شده</span></div><div class="kpi"><b>${fa(Object.keys(S.srs).length)}</b><span>واژه در SRS</span></div><div class="kpi"><b>${fa(S.errors.filter(x=>!x.resolved).length)}</b><span>خطای باز</span></div></div><section class="section grid2"><article class="panel"><h3>تسلط مهارت‌ها</h3>${Object.entries(S.mastery.skills).map(([k,v])=>`<p>${skillFa(k)} <b>${fa(v)}٪</b></p><div class="bar"><span style="width:${Math.min(100,v)}%"></span></div>`).join('')}</article><article class="panel"><h3>تصمیم بعدی موتور تطبیقی</h3><div class="notice">مهارت <b>${skillFa(weakness())}</b> کمترین امتیاز را دارد. جلسه‌های آینده با تمرین کوتاه، SRS و فعالیت چندمهارتی تنظیم می‌شوند.</div><h3>فعالیت اخیر</h3>${S.activities.slice(0,7).map(a=>`<p><b>${esc(a.label)}</b><br><small class="muted">${new Date(a.date).toLocaleString('fa-IR')}</small></p>`).join('')||'<p class="muted">هنوز فعالیتی ثبت نشده است.</p>'}</article></section>`}

function onboarding(){runtime.onboardingStep=1;runtime.onboardingDraft=clone(S.profile);renderOnboarding()}function renderOnboarding(){const d=runtime.onboardingDraft,st=runtime.onboardingStep;const steps=[()=>`<div class="field"><label>نام</label><input id="obName" value="${esc(d.name==='زبان‌آموز'?'':d.name)}" placeholder="نام زبان‌آموز"></div><div class="notice">DeutschWeg برای یادگیری عمومی زبان آلمانی است؛ نه برنامه پزشکی و نه پنل مدرس.</div>`,()=>`<div class="grid2"><div class="field"><label>سطح فعلی</label><select id="obCurrent">${LEVELS.map(x=>`<option ${d.current===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>سطح مقصد</label><select id="obTarget">${LEVELS.map(x=>`<option ${d.target===x?'selected':''}>${x}</option>`).join('')}</select></div></div>`,()=>`<div class="field"><label>هدف اصلی</label><div class="choices">${[['general','تسلط عمومی'],['work','کار و مهاجرت'],['exam','آزمون'],['study','تحصیل']].map(x=>`<button class="choice ${d.goal===x[0]?'on':''}" data-ob-single="goal" data-value="${x[0]}">${x[1]}</button>`).join('')}</div></div><div class="field"><label>مهلت تقریبی</label><select id="obDeadline">${[3,4,6,9,12].map(x=>`<option value="${x}" ${d.deadlineMonths==x?'selected':''}>${x} ماه</option>`).join('')}</select></div>`,()=>`<div class="grid2"><div class="field"><label>دقیقه هر جلسه</label><select id="obMinutes">${[20,30,35,45,60].map(x=>`<option ${d.minutes==x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>روز در هفته</label><select id="obDays">${[3,4,5,6,7].map(x=>`<option ${d.days==x?'selected':''}>${x}</option>`).join('')}</select></div></div>`,()=>`<div class="field"><label>مهارت‌های اولویت‌دار</label><div class="choices">${['listening','reading','speaking','writing'].map(x=>`<button class="choice ${d.skillPriorities.includes(x)?'on':''}" data-ob-multi="skills" data-value="${x}">${skillFa(x)}</button>`).join('')}</div></div>`,()=>`<div class="field"><label>علایق</label><div class="choices">${[['daily','زندگی روزمره'],['travel','سفر'],['work','کار'],['study','تحصیل'],['migration','مهاجرت و اداری'],['media','رسانه'],['technology','فناوری و محیط زیست']].map(x=>`<button class="choice ${d.interests.includes(x[0])?'on':''}" data-ob-multi="interests" data-value="${x[0]}">${x[1]}</button>`).join('')}</div></div>`,()=>`<div class="panel"><h3>${esc(d.name||'زبان‌آموز')}</h3><p>${d.current} → ${d.target}</p><p>${fa(d.days)} روز × ${fa(d.minutes)} دقیقه · ${fa(d.deadlineMonths)} ماه</p><p>مهارت‌ها: ${d.skillPriorities.map(skillFa).join('، ')}</p></div>`];openOverlay(dialog('ساخت برنامه شخصی',`مرحله ${fa(st)} از ۷`,`<div class="steps">${Array.from({length:7},(_,i)=>`<span class="${i<st?'on':''}"></span>`).join('')}</div><div class="section form">${steps[st-1]()}</div>`,`<button class="btn secondary" data-action="ob-prev" ${st===1?'disabled':''}>قبلی</button><button class="btn primary" data-action="ob-next">${st===7?'ساخت برنامه':'ادامه'}</button>`))}

function topicModal(id){const p=topicById(id);if(!p)return;S.recent=[p.title,...S.recent.filter(x=>x!==p.title)].slice(0,12);safeSet(KEY,JSON.stringify(S));openOverlay(dialog(esc(p.title),`${p.deTitle} · ${p.level} · ${p.status}`,`<div class="notice">این بسته عمومی است. وضعیت ${p.status==='project-draft'?'Project Draft':'Curated'} به معنی Verified مستقل نیست.</div><div class="section word-grid">${p.words.map(w=>`<article class="word-card"><h3>${esc(w.de)}</h3><p>${esc(w.fa)}</p><button class="btn secondary small" data-speak="${esc(w.de)}">شنیدن</button></article>`).join('')}</div><div class="section panel"><h3>Reading</h3><p lang="de" dir="ltr">${esc(p.reading.de)}</p></div>`,`<button class="btn secondary" data-action="close">بستن</button><button class="btn primary" data-action="start-topic" data-id="${p.id}">شروع جلسه</button>`))}
function sessionModal(id){const s=S.plan.sessions.find(x=>x.id===id);if(!s)return;runtime.sessionId=id;runtime.sessionStep=Math.min(s.step||0,7);renderSession()}
const LESSON_STEPS=['شروع','واژگان','شنیداری','خواندن','گفتار','نوشتن','گرامر و Quiz','نتیجه'];
function renderSession(){const s=S.plan.sessions.find(x=>x.id===runtime.sessionId),p=topicById(s.topic),step=runtime.sessionStep;const body=sessionStage(s,p,step);openOverlay(dialog(`جلسه ${fa(s.index)} — ${esc(p.title)}`,`${p.level} · ${skillFa(s.skill)} · ${fa(s.minutes)} دقیقه`,`<div class="lesson-shell"><aside class="lesson-steps">${LESSON_STEPS.map((x,i)=>`<button class="lesson-step ${i===step?'active':''} ${i<(s.step||0)?'done':''}" data-lesson-step="${i}">${fa(i+1)}. ${x}</button>`).join('')}</aside><main class="lesson-main">${body}</main></div>`,`<button class="btn secondary" data-action="lesson-prev" ${step===0?'disabled':''}>قبلی</button><button class="btn primary" data-action="lesson-next">${step===7?'ثبت و پایان':'مرحله بعد'}</button>`,true))}
function sessionStage(s,p,st){if(st===0)return`<span class="pill">${p.status}</span><h2>${esc(p.title)}</h2><p>${esc(p.description)}</p><div class="notice">مسیر این جلسه: واژگان → شنیداری → خواندن → گفتار → نوشتن → گرامر → نتیجه.</div>`;if(st===1)return`<h2>واژگان در بافت</h2><div class="word-grid">${p.words.map(w=>`<article class="word-card"><span class="pill">${w.level}</span><h3>${esc(w.de)}</h3><p>${esc(w.fa)}</p><p lang="de" dir="ltr">${esc(w.example)}</p><div class="row"><button class="btn secondary small" data-speak="${esc(w.de)}">شنیدن</button><button class="btn secondary small" data-add-srs="${w.id}">SRS</button></div></article>`).join('')}</div>`;if(st===2)return`<h2>شنیداری و دیکته</h2><div class="panel"><button class="btn primary" data-speak="${esc(p.listening)}">${icon('play')} پخش جمله</button><div class="field section"><label>آنچه شنیدید بنویسید</label><textarea id="dictationInput"></textarea></div><button class="btn secondary" data-action="check-dictation">بررسی</button><div id="dictationFeedback" class="section"></div></div>`;if(st===3){const tokens=p.reading.de.split(/(\s+)/).map(t=>/^[A-Za-zÄÖÜäöüß]+[.,!?]?$/u.test(t)?`<button class="word-token" data-dict-word="${esc(t.replace(/[.,!?]/g,''))}">${esc(t)}</button>`:esc(t)).join('');return`<h2>خواندن تعاملی</h2><div class="panel"><p lang="de" dir="ltr" style="font-size:18px;line-height:2.1">${tokens}</p><p class="muted">برای دیدن معنی و افزودن به SRS روی واژه کلیک کنید.</p><div id="dictionaryBox"></div></div>`}if(st===4)return`<h2>گفتار و Shadowing</h2><div class="panel"><p>جمله هدف:</p><h3 lang="de" dir="ltr">${esc(p.speaking)}</h3><div class="row"><button class="btn primary" data-speak="${esc(p.speaking)}">شنیدن</button><button class="btn secondary" data-action="speech-recognition">تشخیص گفتار</button><button class="btn secondary" data-action="record-audio">ضبط صدا</button></div><div id="speechFeedback" class="notice section">نتیجه گفتار اینجا نمایش داده می‌شود.</div><audio id="audioPlayback" class="hide section" controls></audio></div>`;if(st===5)return`<h2>نوشتن</h2><div class="panel"><p>${esc(p.writing)}</p><div class="field"><textarea id="writingInput" placeholder="متن آلمانی خود را بنویسید…"></textarea></div><p id="writingCount" class="muted">۰ واژه</p><button class="btn secondary" data-action="save-writing">ذخیره و ارزیابی ساختاری</button><div id="writingFeedback" class="section"></div></div>`;if(st===6)return`<h2>گرامر و Quiz</h2><div class="grid2"><article class="panel"><h3>${esc(p.grammar.prompt)}</h3><div class="choices">${p.grammar.options.map((o,i)=>`<button class="choice" data-grammar-answer="${i}">${esc(o)}</button>`).join('')}</div><div id="grammarFeedback"></div></article><article class="panel"><h3>${esc(p.quiz.prompt)}</h3><div class="choices">${p.quiz.options.map((o,i)=>`<button class="choice" data-quiz-answer="${i}">${esc(o)}</button>`).join('')}</div><div id="quizFeedback"></div></article></div>`;const scores=Object.values(s.scores||{}),avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;return`<div class="grid2"><div style="display:grid;place-items:center"><div class="score-ring" style="--score:${avg}%"><b>${fa(avg)}٪</b></div></div><div><h2>نتیجه جلسه</h2><p>شنیداری: ${fa(s.scores.listening||0)}٪</p><p>گفتار: ${fa(s.scores.speaking||0)}٪</p><p>نوشتن: ${fa(s.scores.writing||0)}٪</p><p>گرامر: ${fa(s.scores.grammar||0)}٪</p><div class="notice">پس از ثبت پایان، امتیازهای مهارت و Planner به‌روزرسانی می‌شوند.</div></div></div>`}
function similarity(a,b){const A=String(a).toLowerCase().replace(/[^a-zäöüß0-9 ]/g,'').split(/\s+/).filter(Boolean),B=String(b).toLowerCase().replace(/[^a-zäöüß0-9 ]/g,'').split(/\s+/).filter(Boolean);if(!A.length||!B.length)return 0;const hit=A.filter(x=>B.includes(x)).length;return Math.round(hit/Math.max(A.length,B.length)*100)}function updateSessionScore(skill,score){const s=S.plan.sessions.find(x=>x.id===runtime.sessionId);s.scores[skill]=Math.max(s.scores[skill]||0,score);S.mastery.skills[skill]=Math.min(100,Math.round(S.mastery.skills[skill]*.8+score*.2));safeSet(KEY,JSON.stringify(S))}
function speak(text,rate=.88){if(!('speechSynthesis'in window))return toast('موتور گفتار در این مرورگر موجود نیست');speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';u.rate=rate;speechSynthesis.speak(u);record('listening','پخش صوت آلمانی',1)}
function dictionary(word){const w=allWords().find(x=>x.de.toLowerCase()===word.toLowerCase())||allWords().find(x=>x.de.toLowerCase().includes(word.toLowerCase()));const box=$('#dictionaryBox');box.innerHTML=`<div class="dictionary"><span class="pill ${w&&String(w.status).includes('candidate')?'warn':''}">${w?.level||'UNRATED'} · ${esc(w?.status||'not-found')}</span><h3 lang="de" dir="ltr">${esc(word)}</h3><p>${esc(w?.fa||'معنی فارسی تأییدشده در داده فعلی وجود ندارد.')}</p><p lang="de" dir="ltr">${esc(w?.example||'')}</p><div class="row"><button class="btn secondary small" data-speak="${esc(word)}">شنیدن</button>${w?`<button class="btn secondary small" data-add-srs="${w.id}">افزودن به SRS</button>`:''}</div></div>`}
function addSrs(id){const w=allWords().find(x=>x.id===id);if(!w)return;S.srs[id]??={due:today(),interval:0,ease:2.5,repetitions:0,lapses:0};S.mastery.vocabulary[id]??={status:'new',stability:0,last:null};record('srs','افزودن '+w.de);save(false);toast('به SRS افزوده شد');renderWordResults?.()}
function srsModal(){const due=dueWords();if(!due.length)return openOverlay(dialog('مرور SRS','مرورهای سررسیدشده','<div class="empty">مروری برای امروز وجود ندارد.</div>','<button class="btn secondary" data-action="close">بستن</button>'));const w=due[0];openOverlay(dialog('مرور SRS',`${fa(due.length)} واژه سررسید`,`<article class="panel" style="text-align:center"><span class="pill">${w.level}</span><h2 lang="de" dir="ltr">${esc(w.de)}</h2><button class="btn primary" data-action="srs-reveal">نمایش پاسخ</button><div id="srsAnswer" class="hide"><p><b>${esc(w.fa||'معنی فارسی بازبینی نشده')}</b></p><p lang="de" dir="ltr">${esc(w.example||'')}</p><div class="row" style="justify-content:center"><button class="btn danger" data-srs-rate="again" data-id="${w.id}">دوباره</button><button class="btn secondary" data-srs-rate="hard" data-id="${w.id}">سخت</button><button class="btn primary" data-srs-rate="good" data-id="${w.id}">خوب</button><button class="btn secondary" data-srs-rate="easy" data-id="${w.id}">آسان</button></div></div></article>`))}
function rateSrs(id,r){const x=S.srs[id],q={again:0,hard:3,good:4,easy:5}[r];if(q===0){x.repetitions=0;x.interval=1;x.lapses=(x.lapses||0)+1;x.ease=Math.max(1.3,x.ease-.2)}else{if(x.repetitions===0)x.interval=1;else if(x.repetitions===1)x.interval=6;else x.interval=Math.round(x.interval*x.ease*(r==='easy'?1.3:r==='hard'?.8:1));x.repetitions++;x.ease=Math.max(1.3,x.ease+(q===5?.15:q===3?-.15:0))}x.due=addDays(x.interval);const m=S.mastery.vocabulary[id]||{};S.mastery.vocabulary[id]={...m,status:x.repetitions>=5?'mastered':x.lapses?'learning':'reviewing',stability:x.interval,last:now()};record('srs','مرور '+(allWords().find(w=>w.id===id)?.de||id),3);save(false);closeOverlay();setTimeout(srsModal,120)}
function quickPractice(skill){const p=PACKS[Math.floor(Math.random()*PACKS.length)];if(skill==='listening'||skill==='dictation')openOverlay(dialog('تمرین کوتاه شنیداری',p.title,`<div class="panel"><button class="btn primary" data-speak="${esc(p.listening)}">پخش</button><div class="field section"><textarea id="quickInput"></textarea></div><button class="btn secondary" data-action="quick-check" data-target="${esc(p.listening)}">بررسی</button><div id="quickFeedback"></div></div>`));else if(skill==='speaking'||skill==='shadowing')openOverlay(dialog('Shadowing',p.title,`<div class="panel"><h3 lang="de" dir="ltr">${esc(p.speaking)}</h3><div class="row"><button class="btn primary" data-speak="${esc(p.speaking)}">Listen</button><button class="btn secondary" data-action="speech-recognition" data-target="${esc(p.speaking)}">Repeat & Check</button><button class="btn secondary" data-action="record-audio">Record</button></div><div id="speechFeedback" class="notice section"></div><audio id="audioPlayback" class="hide" controls></audio></div>`));else if(skill==='reading')topicModal(p.id);else if(skill==='writing')openOverlay(dialog('تمرین نوشتن',p.title,`<div class="panel"><p>${esc(p.writing)}</p><textarea id="writingInput"></textarea><button class="btn primary section" data-action="save-writing">ذخیره</button><div id="writingFeedback"></div></div>`));else toast('تمرین کوتاه آماده شد')}

function startExam(type='placement'){const pool=PACKS.filter(p=>type==='placement'||LEVELS.indexOf(p.level)<=LEVELS.indexOf(S.profile.target));const qs=pool.sort(()=>Math.random()-.5).slice(0,type==='placement'?12:10).map(p=>({topic:p.id,level:p.level,prompt:type==='placement'?p.grammar.prompt:`معنی «${p.words[0].de}» چیست؟`,options:type==='placement'?p.grammar.options:[p.words[0].fa,...PACKS.filter(x=>x.id!==p.id).slice(0,2).map(x=>x.words[0].fa)].sort(()=>Math.random()-.5),answer:type==='placement'?p.grammar.answer:null,correctText:type==='placement'?p.grammar.options[p.grammar.answer]:p.words[0].fa}));qs.forEach(q=>{if(q.answer===null)q.answer=q.options.indexOf(q.correctText)});runtime.exam={type,qs,index:0,score:0,answers:[]};renderExam()}
function renderExam(){const e=runtime.exam,q=e.qs[e.index];if(!q){const pct=Math.round(e.score/e.qs.length*100),level=pct<30?'A1':pct<50?'A2':pct<70?'B1':pct<88?'B2':'C1';S.examHistory.unshift({type:e.type,score:pct,level,date:now()});record('exam',`آزمون ${pct}٪`,20);save(false);return openOverlay(dialog('نتیجه آزمون',e.type==='placement'?`سطح برآوردی: ${level}`:'Vocabulary Exam',`<div class="grid2"><div style="display:grid;place-items:center"><div class="score-ring" style="--score:${pct}%"><b>${fa(pct)}٪</b></div></div><div><h3>${e.type==='placement'?`سطح برآوردی ${level}`:'نتیجه ثبت شد'}</h3><p>این نتیجه آموزشی است و مدرک رسمی محسوب نمی‌شود.</p>${e.type==='placement'?`<button class="btn primary" data-action="apply-placement" data-level="${level}">ثبت به‌عنوان سطح فعلی</button>`:''}</div></div>`,'<button class="btn secondary" data-action="close">بستن</button>'))}openOverlay(dialog('آزمون',`سؤال ${fa(e.index+1)} از ${fa(e.qs.length)}`,`<article class="panel"><span class="pill">${q.level}</span><h2>${esc(q.prompt)}</h2><div class="choices">${q.options.map((o,i)=>`<button class="choice" data-exam-answer="${i}">${esc(o)}</button>`).join('')}</div></article>`))}

function renderCourseMap(){return`<div class="course-intro"><div><h2>مسیر ${S.profile.current} تا ${S.profile.target}</h2><p>هر مرحله شامل Unit، Practice، Review و Checkpoint است. قفل مرحله بعد فقط با پیشرفت واقعی باز می‌شود.</p></div><div class="donut" style="--p:${calcGoalPct()}%"><div class="donut-content"><b>${fa(calcGoalPct())}٪</b><span>کل مسیر</span></div></div></div><div class="course-path">${COURSE_STAGES.map((st,i)=>{const unlocked=stageUnlocked(i),progress=stageProgress(st.id),packs=stagePacks(st.id),completedStage=progress>=80;return`<section class="stage-row"><div class="stage-orb ${completedStage?'completed':unlocked?'unlocked':'locked'}">${unlocked?`<b>${st.label}</b>`:xraw('lock')}</div><article class="stage-card"><div class="stage-head"><div><span class="pill ${completedStage?'ok':unlocked?'':'warn'}">${completedStage?'تسلط':unlocked?'فعال':'قفل'}</span><h3>${st.title}</h3><p>${fa(packs.length)} واحد · ${st.cefr}</p></div><div class="stage-progress"><b>${fa(progress)}٪</b><div class="bar"><span style="width:${progress}%"></span></div></div></div><div class="unit-row">${packs.map((p,j)=>{const active=unlocked&&progress<80&&j===0;return`<article class="unit-tile ${active?'active':''}"><div class="unit-icon">${xraw(topicIcon(p))}</div><h4>${esc(p.title)}</h4><p>${esc(p.description)}</p><button class="btn ${active?'primary':'secondary'} small" data-course-unit="${p.id}" ${unlocked?'':'disabled'}>${unlocked?(active?'ادامه واحد':'بازکردن'):'قفل'}</button></article>`}).join('')||'<div class="empty">محتوای این مرحله در بسته بعدی افزوده می‌شود.</div>'}</div></article></section>`}).join('')}</div>`}

function renderProgress(){const done=completed(),minutes=S.activities.reduce((a,x)=>a+(x.minutes||0),0),openErrors=S.errors.filter(x=>!x.resolved).length;const days=Array.from({length:56},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(55-i));const key=d.toISOString().slice(0,10),count=S.activities.filter(a=>a.date.slice(0,10)===key).length;return count});return`${pageHead('پیشرفت','تسلط، پیوستگی و آمادگی سطح بر اساس فعالیت واقعی.')}<div class="progress-grid"><article class="metric-card" style="--metric:#0b7f77"><div class="metric-head"><div class="metric-icon">${xraw('check')}</div><span>جلسات</span></div><b class="big">${fa(done)}</b><span>جلسه تکمیل‌شده</span></article><article class="metric-card" style="--metric:#5367e9"><div class="metric-head"><div class="metric-icon">${xraw('calendar')}</div><span>زمان</span></div><b class="big">${fa(minutes)}</b><span>دقیقه فعالیت ثبت‌شده</span></article><article class="metric-card" style="--metric:#df6279"><div class="metric-head"><div class="metric-icon">${xraw('flame')}</div><span>پیوستگی</span></div><b class="big">${fa(streak())}</b><span>روز متوالی</span></article><article class="metric-card" style="--metric:#2d91e7"><div class="metric-head"><div class="metric-icon">${xraw('cards')}</div><span>واژگان</span></div><b class="big">${fa(Object.keys(S.srs).length)}</b><span>واژه در SRS</span></article><article class="metric-card" style="--metric:#f0a936"><div class="metric-head"><div class="metric-icon">${xraw('target')}</div><span>مسیر</span></div><b class="big">${fa(calcGoalPct())}٪</b><span>${S.profile.current} → ${S.profile.target}</span></article><article class="metric-card" style="--metric:#c43f53"><div class="metric-head"><div class="metric-icon">${xraw('puzzle')}</div><span>خطاها</span></div><b class="big">${fa(openErrors)}</b><span>خطای باز برای مرور</span></article></div><section class="section grid2"><article class="panel"><div class="section-title"><div><h2>تسلط مهارت‌ها</h2><p>Mastery واقعی هر حوزه</p></div></d function pronunciationCheck(target,phraseId){const R=window.SpeechRecognition||window.webkitSpeechRecognition,result=$('#pronunciationResult');if(!R){if(result)result.innerHTML='<div class="notice">Speech Recognition در این مرورگر موجود نیست. همچنان می‌توانید صدای خود را ضبط و با صوت هدف مقایسه کنید.</div>';return}const r=new R();r.lang='de-DE';r.interimResults=false;r.maxAlternatives=1;r.onresult=e=>{const transcript=e.results[0][0].transcript,score=similarity(transcript,target),spoken=new Set(transcript.toLowerCase().replace(/[^a-zäöüß ]/g,'').split(/\s+/));const tokens=target.split(/\s+/).map(w=>{const clean=w.toLowerCase().replace(/[^a-zäöüß]/g,'');return`<span class="${spoken.has(clean)?'hit':'miss'}">${esc(w)}</span>`}).join('');const entry={id:crypto.randomUUID?.()||String(Date.now()),phrase:phraseId,target,transcript,score,date:now()};S.production.voicePortfolio.unshift(entry);S.production.voicePortfolio=S.production.voicePortfolio.slice(0,120);S.mastery.skills.speaking=Math.min(100,Math.round(S.mastery.skills.speaking*.85+score*.15));record('speaking','Pronunciation Lab',3,{score});safeSet(KEY,JSON.stringify(S));telemetry('pronunciation_attempt',{phrase:phraseId,score});if(result)result.innerHTML=`<div class="notice"><b>پوشش واژگانی: ${fa(score)}٪</b><br>متن تشخیص‌شده: <span lang="de" dir="ltr">${esc(transcript)}</span></div><div class="token-feedback section">${tokens}</div><p class="muted">سبز یعنی واژه در Transcript تشخیص داده شده است. این نتیجه ارزیابی واج‌به‌واج یا لهجه نیست.</p>`};r.onerror=e=>{if(result)result.innerHTML=`<div class="notice">خطای تشخیص گفتار: ${esc(e.error)}</div>`};r.start()}

            const box = document.createElement('div');
            box.className = 'update-banner';
            box.innerHTML = '<div class="row"><div><b>نسخه جدید آماده است</b><p>برای اعمال به‌روزرسانی برنامه را تازه‌سازی کنید.</p></div><button class="btn primary small" onclick="location.reload()">به‌روزرسانی</button></div>';
            document.body.append(box);
          }
        });
      });
      setInterval(() => reg.update(), 60 * 60 * 1000);
    } catch (e) {
      console.warn('Service worker registration failed', e);
    }
  });
}
