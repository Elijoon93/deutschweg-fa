k","qfa":"سؤال درست کدام است؟","qde":"Welche Frage ist richtig?","options":["Wo du wohnst?","Wo wohnst du?","Wo wohnen du?","Du wohnst wo bist?"],"answer":1,"efa":"در سؤال مستقیم، فعل صرف‌شده در جایگاه دوم می‌آید: Wo wohnst du?","ede":"In der direkten W-Frage steht das finite Verb an zweiter Stelle."},{"id":"A1-L-02","level":"A1","skill":"Lesen","qfa":"تابلو: „Montag geschlossen“. فروشگاه چه روزی بسته است؟","qde":"Schild: „Montag geschlossen“. Wann ist das Geschäft zu?","options":["یکشنبه","دوشنبه","سه‌شنبه","جمعه"],"answer":1,"efa":"Montag یعنی دوشنبه و geschlossen یعنی بسته.","ede":"Montag = دوشنبه; geschlossen = بسته."},{"id":"A2-G-01","level":"A2","skill":"Grammatik","qfa":"Perfekt درست را انتخاب کنید: Gestern ___ ich lange ___.","qde":"Wähle das richtige Perfekt: Gestern ___ ich lange ___.","options":["habe / gearbeitet","bin / gearbeitet","habe / arbeiten","war / gearbeitet"],"answer":0,"efa":"arbeiten با haben و Partizip II «gearbeitet» می‌آید.","ede":"arbeiten bildet das Perfekt mit haben: habe gearbeitet."},{"id":"A2-G-02","level":"A2","skill":"Grammatik","qfa":"جمله با weil را کامل کنید: Ich bleibe zu Hause, weil ...","qde":"Ergänze mit weil: Ich bleibe zu Hause, weil ...","options":["ich bin krank","ich krank bin","bin ich krank","krank ich bin"],"answer":1,"efa":"در جمله وابسته با weil، فعل صرف‌شده در پایان می‌آید.","ede":"Im weil-Satz steht das finite Verb am Ende."},{"id":"A2-W-01","level":"A2","skill":"Wortschatz","qfa":"«einen Termin vereinbaren» یعنی چه؟","qde":"Was bedeutet „einen Termin vereinbaren“?","options":["یک قرار تنظیم کردن","قرار را لغو کردن","دیر رسیدن","درخواست مرخصی"],"answer":0,"efa":"vereinbaren در این ترکیب یعنی هماهنگ یا تنظیم کردن.","ede":"einen Termin vereinbaren = einen Termin festlegen."},{"id":"A2-L-01","level":"A2","skill":"Lesen","qfa":"متن: „Der Kurs beginnt um 18 Uhr. Bitte kommen Sie zehn Minuten früher.“ چه زمانی بهتر است برسید؟","qde":"Text: „Der Kurs beginnt um 18 Uhr. Bitte kommen Sie zehn Minuten früher.“ Wann sollten Sie kommen?","options":["17:40","17:50","18:00","18:10"],"answer":1,"efa":"ده دقیقه قبل از ۱۸:۰۰ می‌شود ۱۷:۵۰.","ede":"Zehn Minuten vor 18 Uhr ist 17:50 Uhr."},{"id":"A2-G-03","level":"A2","skill":"Grammatik","qfa":"حالت درست Dativ: Ich fahre mit ___ Bus.","qde":"Richtiger Dativ: Ich fahre mit ___ Bus.","options":["der","die","dem","den"],"answer":2,"efa":"حرف اضافه mit همیشه Dativ می‌گیرد: mit dem Bus.","ede":"mit verlangt den Dativ: mit dem Bus."},{"id":"A2-W-02","level":"A2","skill":"Wortschatz","qfa":"بهترین پاسخ: „Könnten Sie mir bitte helfen?“","qde":"Beste Antwort: „Könnten Sie mir bitte helfen?“","options":["Ja, natürlich.","Nein, ich heiße Ali.","Um acht Uhr.","Drei Euro."],"answer":0,"efa":"پاسخ طبیعی به درخواست کمک، موافقت یا رد مودبانه است.","ede":"Auf eine Bitte reagiert man mit Zustimmung oder höflicher Ablehnung."},{"id":"A2-G-04","level":"A2","skill":"Grammatik","qfa":"جمله مقایسه‌ای درست کدام است؟","qde":"Welcher Vergleich ist richtig?","options":["Berlin ist groß als Bonn.","Berlin ist größer als Bonn.","Berlin ist am größer Bonn.","Berlin größer wie Bonn ist."],"answer":1,"efa":"برای مقایسه نابرابر از Komparativ + als استفاده می‌شود.","ede":"Ungleichheit: Komparativ + als."},{"id":"A2-L-02","level":"A2","skill":"Lesen","qfa":"پیام: „Der Zug fällt heute aus. Bitte nehmen Sie den Bus.“ چه اتفاقی افتاده؟","qde":"Nachricht: „Der Zug fällt heute aus. Bitte nehmen Sie den Bus.“ Was ist passiert?","options":["قطار تأخیر دارد","قطار لغو شده","اتوبوس خراب است","ایستگاه بسته است"],"answer":1,"efa":"ausfallen یعنی برگزار یا حرکت نکردن؛ قطار لغو شده است.","ede":"ausfallen bedeutet: Der Zug fährt nicht."},{"id":"B1-G-01","level":"B1","skill":"Grammatik","qfa":"جمله موصولی درست: Das ist die Kollegin, ___ mir geholfen hat.","qde":"Richtiger Relativsatz: Das ist die Kollegin, ___ mir geholfen hat.","options":["die","der","den","dem"],"answer":0,"efa":"مرجع Kollegin مؤنث و در جمله موصولی فاعل است: die.","ede":"Kollegin ist feminin und Subjekt im Relativsatz: die."},{"id":"B1-G-02","level":"B1","skill":"Grammatik","qfa":"کدام جمله Konjunktiv II مودبانه است؟","qde":"Welcher Satz ist höflicher Konjunktiv II?","options":["Gib mir das Formular.","Könnten Sie mir das Formular geben?","Du gibst Formular.","Formular geben jetzt."],"answer":1,"efa":"Könnten Sie ... ساختار استاندارد درخواست مودبانه است.","ede":"„Könnten Sie ...?“ ist eine typische höfliche Bitte."},{"id":"B1-W-01","level":"B1","skill":"Wortschatz","qfa":"بهترین ترکیب: Verantwortung ...","qde":"Welche Kollokation passt? Verantwortung ...","options":["übernehmen","trinken","fahren","schlafen"],"answer":0,"efa":"ترکیب ثابت Verantwortung übernehmen یعنی مسئولیت پذیرفتن.","ede":"Die feste Verbindung lautet: Verantwortung übernehmen."},{"id":"B1-L-01","level":"B1","skill":"Lesen","qfa":"متن: „Obwohl der Weg länger war, entschied sich Lea für das Fahrrad, weil sie etwas für die Umwelt tun wollte.“ چرا دوچرخه را انتخاب کرد؟","qde":"Warum wählte Lea das Fahrrad?","options":["چون سریع‌تر بود","چون ارزان نبود","برای کمک به محیط زیست","چون هوا بارانی بود"],"answer":2,"efa":"دلیل مستقیماً بعد از weil بیان شده است.","ede":"Der Grund steht im weil-Satz: etwas für die Umwelt tun."},{"id":"B1-G-03","level":"B1","skill":"Grammatik","qfa":"حالت مجهول درست: Die Straße ___ repariert.","qde":"Richtiges Passiv: Die Straße ___ repariert.","options":["wird","hat","ist sich","werden"],"answer":0,"efa":"مجهول حال: werden + Partizip II؛ برای مفرد: wird repariert.","ede":"Präsens Passiv: werden + Partizip II; Singular: wird repariert."},{"id":"B1-W-02","level":"B1","skill":"Wortschatz","qfa":"«sich bewerben um» در چه موقعیتی به‌کار می‌رود؟","qde":"Wann verwendet man „sich bewerben um“?","options":["درخواست شغل یا جایگاه","خرید بلیت","توصیف آب‌وهوا","رزرو میز"],"answer":0,"efa":"sich um eine Stelle bewerben یعنی برای یک موقعیت شغلی درخواست دادن.","ede":"Man bewirbt sich um eine Stelle oder einen Studienplatz."},{"id":"B1-G-04","level":"B1","skill":"Grammatik","qfa":"رابط مناسب: Ich hatte wenig Z ","ede":"Die übliche Kollokation lautet: eine Entscheidung treffen."},{"id":"B2-L-01","level":"B2","skill":"Lesen","qfa":"متن: „Die Maßnahme senkte zwar kurzfristig die Kosten, führte jedoch langfristig zu einem höheren Wartungsaufwand.“ نتیجه بلندمدت چه بود؟","qde":"Was war die langfristige Folge?","options":["کاهش نگهداری","افزایش هزینه نگهداری","کاهش کیفیت داده","حذف کامل هزینه‌ها"],"answer":1,"efa":"عبارت führte ... zu einem höheren Wartungsaufwand پیامد بلندمدت را بیان می‌کند.","ede":"Langfristig entstand ein höherer Wartungsaufwand."},{"id":"B2-G-03","level":"B2","skill":"Grammatik","qfa":"Nominalisierung مناسب: Weil die Nachfrage steigt, ...","qde":"Passende Nominalisierung: Weil die Nachfrage steigt, ...","options":["Aufgrund der steigenden Nachfrage ...","Aufgrund die Nachfrage steigt ...","Wegen steigt die Nachfrage ...","Trotz der Nachfrage steigt ..."],"answer":0,"efa":"Aufgrund + Genitiv و صفت فعلی: aufgrund der steigenden Nachfrage.","ede":"Aufgrund + Genitiv: aufgrund der steigenden Nachfrage."},{"id":"B2-W-02","level":"B2","skill":"Wortschatz","qfa":"کدام عبارت برای بیان تردید علمی مناسب‌تر است؟","qde":"Welche Wendung drückt wissenschaftliche Vorsicht aus?","options":["Die Ergebnisse deuten darauf hin, dass ...","Es ist hundertprozentig so.","Das ist einfach klar.","Jeder weiß, dass ..."],"answer":0,"efa":"deuten darauf hin بیان محتاطانه و مبتنی بر شواهد است.","ede":"„Die Ergebnisse deuten darauf hin“ formuliert vorsichtig und evidenzbasiert."},{"id":"B2-G-04","level":"B2","skill":"Grammatik","qfa":"جمله Partizipialattribut درست: die ___ Daten","qde":"Richtiges Partizipialattribut: die ___ Daten","options":["gestern erhobenen","gestern erheben","gestern erhobene dem","erhobenen gestern sind"],"answer":0,"efa":"برای جمع معین: die gestern erhobenen Daten.","ede":"Mit bestimmtem Artikel im Plural: die gestern erhobenen Daten."},{"id":"B2-L-02","level":"B2","skill":"Lesen","qfa":"نویسنده می‌گوید: „Ein Verbot allein greift zu kurz; nötig sind zugleich Information und praktikable Alternativen.“ موضع اصلی چیست؟","qde":"Was ist die Hauptposition?","options":["فقط ممنوعیت کافی است","ممنوعیت باید با اطلاع‌رسانی و جایگزین همراه باشد","اطلاع‌رسانی بی‌فایده است","هیچ اقدامی لازم نیست"],"answer":1,"efa":"greift zu kurz یعنی کافی نیست؛ نویسنده راهکار ترکیبی می‌خواهد.","ede":"„greift zu kurz“ bedeutet: Es reicht nicht; nötig ist ein Maßnahmenmix."},{"id":"C1-G-01","level":"C1","skill":"Grammatik","qfa":"کدام جمله از نظر سبک رسمی دقیق‌تر است؟","qde":"Welcher Satz ist stilistisch formeller und präziser?","options":["Die Umsetzung setzt voraus, dass ausreichende Ressourcen bereitgestellt werden.","Man muss halt genug Sachen haben.","Es braucht irgendwie Ressourcen.","Ressourcen sind so nötig."],"answer":0,"efa":"جمله اول از ساختار رسمی، فعل دقیق و رابطه شرطی روشن استفاده می‌کند.","ede":"Der erste Satz verwendet präzise Verben, Nominalstil und eine klare Bedingungsrelation."},{"id":"C1-G-02","level":"C1","skill":"Grammatik","qfa":"رابط مناسب برای اصلاح یا محدودکردن ادعا کدام است؟","qde":"Welcher Konnektor schränkt eine Aussage ein?","options":["insofern, als","folglich","darüber hinaus","demzufolge"],"answer":0,"efa":"insofern, als برای محدودکردن دامنه یک گزاره به‌کار می‌رود.","ede":"„insofern, als“ präzisiert bzw. begrenzt eine Aussage."},{"id":"C1-W-01","level":"C1","skill":"Wortschatz","qfa":"کدام ترکیب طبیعی است؟","qde":"Welche Kollokation ist idiomatisch?","options":["Bedenken Rechnung tragen","Bedenken bezahlen","Bedenken fahren","Bedenken legen"],"answer":0,"efa":"einer Sache Rechnung tragen یعنی آن را در نظر گرفتن.","ede":"Bedenken Rechnung tragen = Bedenken angemessen berücksichtigen."},{"id":"C1-L-01","level":"C1","skill":"Lesen","qfa":"متن: „Die Studie belegt keinen kausalen Zusammenhang; sie weist lediglich auf eine robuste Korrelation hin.“ کدام نتیجه مجاز است؟","qde":"Welche Schlussfolgerung ist zulässig?","options":["یک متغیر حتماً علت دیگری است","بین متغیرها ارتباط آماری قوی دیده شده، اما علیت ثابت نشده","هیچ رابطه let memory='{}';
function readStoreCandidates(){
 let out=[];
 try{
  let v=localStorage.getItem(STORAGE_KEY);if(v!=null&&v!=='')out.push({text:v,key:STORAGE_KEY});
  for(let k of LEGACY_KEYS){v=localStorage.getItem(k);if(v!=null&&v!=='')out.push({text:v,key:k})}
 }catch(e){}
 if(memory&&memory!=='{}')out.push({text:memory,key:'memory'});
 return out
}
function writeStore(v){memory=v;try{localStorage.setItem(STORAGE_KEY,v)}catch(e){}}
function trimMigrationBackups(){
 try{
  let keys=[];for(let i=0;i<localStorage.length;i++){let k=localStorage.key(i);if(k&&k.startsWith(BACKUP_PREFIX))keys.push(k)}
  keys.sort().reverse().slice(3).forEach(k=>localStorage.removeItem(k))
 }catch(e){}
}
function createMigrationBackup(text,sourceKey){
 if(!text||text==='{}'||sourceKey==='memory')return;
 try{let stamp=new Date().toISOString().replace(/[:.]/g,'-');localStorage.setItem(BACKUP_PREFIX+stamp,text);trimMigrationBackups()}catch(e){}
}
function migrateOld(raw){
 let s=raw&&typeof raw==='object'?JSON.parse(JSON.stringify(raw)):{};
 // نسخه‌های قدیمی ممکن است فقط version داشته باشند. از این نسخه Schema مستقل از نسخه ظاهری برنامه است.
 let from=Number(s.schemaVersion||s.version||1);
 if(from<13){
  s.schemaVersion=13;
  s.version=13;
  s.appVersion=APP_VERSION;
  s.lastMigration={fromSchema:from,toSchema:14,at:new Date().toISOString()};
 }
 return s
}

 s.availability=(raw||{}).availability||regularAvailability();

function loadState(){
 let candidates=readStoreCandidates();
 for(let rec of candidates){
  try{
   let parsed=JSON.parse(rec.text||'{}'),from=Number(parsed.schemaVersion||parsed.version||1);
   let needsMigration=rec.key!==STORAGE_KEY||from<DATA_SCHEMA_VERSION;
   if(needsMigration)createMigrationBackup(rec.text,rec.key);
   let migrated=migrateOld(parsed),s=normalizeState(migrated);
   if(needsMigration){
    s.lastMigration=Object.assign({},s.lastMigration||{},{
     fromSchema:from,toSchema:DATA_SCHEMA_VERSION,sourceKey:rec.key,at:new Date().toISOString()
    });
    writeStore(JSON.stringify(s))
   }
   return s
  }catch(e){
   // داده خراب را دور نمی‌اندازیم؛ نسخه خام آن را نگه می‌داریم و منبع قدیمی بعدی را امتحان می‌کنیم.
   createMigrationBackup(rec.text,rec.key+'-corrupt')
  }
 }
 return normalizeState(migrateOld({}))
}

function renderFocusDock(){let e=document.getElementById('focusDock');if(!e)return;let f=state.focus||defaultState().focus;if(!f.active){e.classList.remove('show');e.innerHTML='';return}let rem=focusRemainingSeconds();if(rem<=0){handleTimerComplete();return}e.classList.add('show');e.innerHTML=`<div class="focus-time">${clockText(rem)}</div><div class="focus-meta"><b>${f.mode==='break'?t('استراحت','Pause'):moduleName(f.module)}</b><span>${f.mode==='break'?t('برای دور بعد آماده شوید','Bereit für die nächste Runde'):t('Focus فعال · زمان در پس‌زمینه حفظ می‌شود','Focus aktiv · Zeit bleibt im Hintergrund korrekt')}</span></div>${f.running?`<button onclick="pauseFocusTimer()">Ⅱ</button>`:`<button class="primary-mini" onclick="resumeFocusTimer()">▶</button>`}<button onclick="stopFocusTimer(${f.mode==='focus'?'true':'false'})">■</button>`}
function focusPanel(){let f=state.focus||defaultState().focus,rem=f.active?focusRemainingSeconds():Number(f.presetMinutes||25)*60;return `<div class="focus-panel"><div class="section-head"><div><span class="kicker">Focus / Pomodoro</span><h3>${t('تمرکز و ثبت خودکار زمان','Fokus & automatische Zeiterfassung')}</h3></div><span class="chip">${f.mode==='break'?t('استراحت','Pause'):moduleName(f.module)}</span></div><div class="timer-display">${clockText(rem)}</div><div class="preset-row"><button class="ghost" onclick="setFocusPreset(25,5)">25 / 5</button><button class="ghost" onclick="setFocusPreset(50,10)">50 / 10</button><button class="ghost" onclick="setFocusPreset(90,15)">90 / 15</button><button class="ghost" onclick="setFocusPreset(15,3)">15 / 3</button></div><div class="field"><label>${t('مهارت این جلسه','Fertigkeit dieser Sitzung')}</label><select onchange="setFocusModule(this.value)">${MODULES.filter(x=>!['Film','Musik'].includes(x.id)).map(m=>`<option value="${m.id}" ${f.module===m.id?'selected':''}>${m.icon} ${t(m.fa,m.de)}</option>`).join('')}</select></div><div class="focus-controls">${!f.active?`<button class="primary" onclick="startFocusTimer()">▶ ${t('شروع تمرکز','Fokus starten')}</button>`:f.running?`<button class="ghost" onclick="pauseFocusTimer()">Ⅱ ${t('توقف موقت','Pausieren')}</button>`:`<button class="primary" onclick="resumeFocusTimer()">▶ ${t('ادامه','Fortsetzen')}</button>`}<button class="danger" onclick="stopFocusTimer(true)">■ ${t('پایان و ثبت','Beenden & speichern')}</button></div><div class="small muted" style="margin-top:8px">${t('تایمر بر اساس زمان واقعی دستگاه محاسبه می‌شود؛ در قفل صفحه یا بازگشت از پس‌زمینه زمان از دست نمی‌رود.','Der Timer basiert auf echter Gerätezeit; beim Sperren oder Zurückkehren aus dem Hintergrund geht keine Zeit verloren.')}</div></div>`}
function studyEvents(){let out=(state.studySessions||[]).map(x=>({date:x.date||String(x.startedAt||'').slice(0,10),minutes:Number(x.minutes||0),module:x.module||'Andere',source:x.source||'focus'}));let linked=new Set((state.studySessions||[]).map(x=>x.taskId).filter(Boolean));state.plan.sessions.concat(state.customTasks||[]).forEach(x=>{if(taskDone(x.id)&&!linked.has(x.id))out.push({date:x.date,minutes:Number(state.actualMinutes[x.id]||x.minutes||0),module:effectiveModule(x),source:'task'})});return out.filter(x=>x.date&&x.minutes>0)}
function startOfWeek(d=new Date()){let x=new Date(d.getFullYear(),d.getMonth(),d.getDate()),day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);return iso(x)}
function studySummary(){let ev=studyEvents(),today=iso(new Date()),ws=startOfWeek(),ms=today.slice(0,7)+'-01',sum=a=>a.reduce((q,x)=>q+x.minutes,0),day=sum(ev.filter(x=>x.date===today)),week=sum(ev.filter(x=>x.date>=ws&&x.date<=today)),month=sum(ev.filter(x=>x.date>=ms&&x.date<=today)),total=sum(ev),byDay={};ev.forEach(x=>byDay[x.date]=(byDay[x.date]||0)+x.minutes);let streak=0,d=new Date();while(true){let k=iso(d);if((byDay[k]||0)>0){streak++;d=addDays(d,-1)}else break}return {day,week,month,total,streak,byDay,events:ev}}

function heatmapHtml(){let x=studySummary(),days=[];for(let i=55;i>=0;i--){let d=addDays(new Date(),-i),k=iso(d),m=x.byDay[k]||0,l=m===0?'':m<20?'l1':m<45?'l2':m<90?'l3':'l4';days.push(`<div class="heat ${l}" title="${k}: ${m} min"></div>`)}return `<div class="heatmap">${days.join('')}</div>`}

function planStats(){let tasks=state.plan.sessions.concat(state.customTasks),done=tasks.filter(x=>taskDone(x.id)).length,mins=tasks.reduce((a,x)=>a+(taskDone(x.id)?Number(state.actualMinutes[x.id]||x.minutes):0),0);return {total:tasks.length,done,pct:tasks.length?Math.round(done/tasks.length*100):0,mins}}

function generatePlan(show=true){
 syncBuilderFields();if(!state.profile.targetLevel){toast(t('ابتدا سطح هدف را انتخاب کنید','Bitte zuerst Zielniveau wählen'));return}let weeks=Math.max(4,Math.min(78,Number(state.profile.weeks||state.profile.months*4.345||12)));state.profile.weeks=weeks;let start=parseDate(state.profile.startDate),sessions=[];let enabled=MODULES.filter(m=>state.preferences.enabled[m.id]!==false).map(m=>m.id);if(!enabled.length){enabled=['Lesen','Hören','Schreiben','Sprechen'];enabled.forEach(x=>state.preferences.enabled[x]=true)}
 for(let w=1;w<=weeks;w++){let phase=phaseFor(w,weeks),theme=THEMES[(w-1)%THEMES.length],av=state.special.enabled&&w<=state.special.weeks?state.specialAvailability:state.availability;
  for(let d=0;d<7;d++){let row=av[d];if(!row||!row.on)continue;let focus=[row.f1,row.f2].filter(x=>enabled.includes(x));if(!focus.length)focus=enabled;
   (row.slots||[]).forEach((sl,si)=>{if(!sl[0]||!sl[1])return;let total=minOf(sl[0],sl[1]),parts=total>=105?2:1,mins=parts===2?[Math.round(total*.67),total-Math.round(total*.67)]:[total];for(let p=0;p<parts;p++){let mid=focus[(w+d+si+p)%focus.length]||enabled[(w+d+p)%enabled.length];if(phase===PHASES[3]&&p===0&&enabled.includes('Prüfung'))mid='Prüfung';if(phase===PHASES[4]&&d===6&&enabled.includes('Prüfung'))mid='Prüfung';sessions.push(makeTask(w,d,addDays(start,(w-1)*7+d),si,p,mid,mins[p],sl[0],sl[1],theme,phase))}});
  }
 }
 state.plan={generatedAt:new Date().toISOString(),weeks,sessions};state.ui.calendarMonth=state.profile.startDate.slice(0,7)+'-01';save();renderAll();if(show)toast(t('تقویم آموزشی تولید شد','Lernkalender wurde erstellt'))
}

function availabilityRows(type){let av=type==='special'?state.specialAvailability:state.availability;return av.map((r,i)=>`<div class="dayrow ${r.on?'':'off'}"><div class="dayhead"><button class="switch ${r.on?'on':''}" onclick="toggleDay('${type}',${i})"><i></i></button><b>${pair(DAYS.fa[i],DAYS.de[i])}</b><button class="ghost" onclick="addSlot('${type}',${i})">＋ ${t('نوبت','Block')}</button></div><div id="slots-${type}-${i}">${(r.slots||[]).map((s,j)=>`<div class="slot"><input type="time" value="${s[0]}" onchange="setSlot('${type}',${i},${j},0,this.value)"><input type="time" value="${s[1]}" onchange="setSlot('${type}',${i},${j},1,this.value)"><button class="danger" onclick="removeSlot('${type}',${i},${j})">×</button></div>`).join('')}</div><div class="focusrow"><select onchange="setFocus('${type}',${i},'f1',this.value)">${moduleOptions(r.f1)}</select><select onchange="setFocus('${type}',${i},'f2',this.value)">${moduleOptions(r.f2)}</select></div></div>`).join('')}
function builderTime(){let p=state.profile;return `<div class="card builder-step"><span class="kicker">${t('زمان مطالعه و تقویم','Lernzeit und Kalender')}</span><div class="grid2"><div class="field"><label>${t('تاریخ شروع میلادی','Gregorianisches Startdatum')}</label><input id="pStart" type="date" value="${p.startDate}" oninput="updateJPreview(this.value)"><div class="tiny muted" id="jPreview">${t('معادل شمسی','Persisches Datum')}: ${ymdText(parseDate(p.startDate))}</div></div><div class="field"><label>${t('تاریخ آزمون','Prüfungsdatum')}</label><input id="pExamDate" type="date" value="${p.examDate||''}"></div></div><div class="grid2"><div class="field"><label>${t('هدف روزانه، دقیقه','Tagesziel, Minuten')}</label><input id="pDaily" type="number" min="15" max="600" value="${p.dailyTarget}"></div><div class="field"><label>${t('هدف هفتگی، دقیقه','Wochenziel, Minuten')}</label><input id="pWeekly" type="number" min="60" max="5000" value="${p.weeklyTarget}"></div></div><div class="field"><label>${t('نمایش تقویم','Kalenderanzeige')}</label><select id="pDateMode"><option value="both" ${p.dateMode==='both'?'selected':''}>شمسی + میلادی / Persisch + Gregorianisch</option><option value="jalali" ${p.dateMode==='jalali'?'selected':''}>فقط شمسی / Nur persisch</option><option value="gregorian" ${p.dateMode==='gregorian'?'selected':''}>فقط میلادی / Nur gregorianisch</option></select></div></div><div class="card"><div class="section-head"><h3>${t('برنامه عادی هفتگی','Regelmäßige Woche')}</h3><span class="chip">24h</span></div>${availabilityRows('regular')}</div><div class="card"><div class="section-head"><h3>${t('برنامه ویژه ابتدای دوره','Sonderplan am Anfang')}</h3><label class="small"><input id="specialEnabled" type="checkbox" ${state.special.enabled?'checked':''}> ${t('فعال','aktiv')}</label></div><div class="field"><label>${t('تعداد هفته ویژه','Anzahl Sonderwochen')}</label><input id="specialWeeks" type="number" min="0" max="12" value="${state.special.weeks}"></div>${availabilityRows('special')}</div><button class="primary" style="width:100%" onclick="syncBuilderFields();save(true);state.ui.builderTab='content';renderBuilder()">${t('ادامه: انتخاب محتوا','Weiter: Inhalte wählen')}</button>`}

function builderContent(){return `<div class="card builder-step"><span class="kicker">${t('ترکیب فعالیت‌ها','Aktivitätenmix')}</span><p class="small muted">${t('هر فعالیت را می‌توانید فعال یا حذف کنید. محور اول و دوم هر روز در بخش زمان قابل انتخاب است.','Aktivitäten können ein- oder ausgeschaltet werden. Pro Wochentag sind zwei Schwerpunkte wählbar.')}</p><div class="chiprow">${MODULES.map(m=>`<button class="chip ${state.preferences.enabled[m.id]!==false?'on':''}" onclick="toggleModule('${m.id}')">${m.icon} ${t(m.fa,m.de)}</button>`).join('')}</div></div><div class="card"><h3>${t('الگوی پیشنهادی','Empfohlenes Profil')}</h3><div class="grid2"><button class="ghost" onclick="applyPreset('balanced')">⚖️ ${t('چهار مهارت متعادل','Vier Fertigkeiten')}</button><button class="ghost" onclick="applyPreset('exam')">📝 ${t('آزمون‌محور','Prüfungsorientiert')}</button><button class="ghost" onclick="applyPreset('media')">🎬 ${t('رسانه‌محور','Medienorientiert')}</button><button class="ghost" onclick="applyPreset('custom')">🧩 ${t('ترکیب کامل','Vollständiger Mix')}</button></div></div><div class="notice">${pair('فیلم، پادکست و موسیقی می‌توانند جایگزین یک جلسه چهارمهارتی شوند؛ اما برای هدف C1 بهتر است هر فعالیت رسانه‌ای خروجی فعال مانند بازگویی، واژگان یا خلاصه داشته باشد.','Film, Podcast und Musik können eine Standardsitzung ersetzen. Für C1 sollte jede Medieneinheit jedoch ein aktives Ergebnis wie Nacherzählung, Wortschatz oder Zusammenfassung erzeugen.')}</div><button class="primary" style="width:100%;margin-top:10px" onclick="state.ui.builderTab='preview';save();renderBuilder()">${t('ادامه: بررسی و تولید','Weiter: prüfen und erstellen')}</button>`}

function levelsBetween(a,b){let L=['A1','A2','B1','B2','C1','C2'];if(!b)return [];let i=a==='UNKNOWN'?0:Math.max(0,L.indexOf(a)),j=Math.max(i,L.indexOf(b));return L.slice(i,j+1)}
function exerciseStats(level=null){let rows=EXERCISE_BANK.filter(x=>!level||x.level===level),attempts=0,correct=0;rows.forEach(x=>{let p=state.learning.exerciseProgress[x.id]||{};attempts+=Number(p.attempts||0);correct+=Number(p.correct||0)});return {attempts,correct,pct:attempts?Math.round(correct/attempts*100):0}}
function skillMastery(level){let skills=['Grammatik','Wortschatz','Lesen','Schreiben','Sprechen'],out={};skills.forEach(s=>{let rows=EXERCISE_BANK.filter(x=>x.level===level&&x.skill===s),a=0,c=0;rows.forEach(x=>{let p=state.learning.exerciseProgress[x.id]||{};a+=Number(p.attempts||0);c+=Number(p.correct||0)});out[s]={a,c,pct:a?Math.round(c/a*100):0}});return out}
function nextRecommendation(){let lev=state.profile.targetLevel||'A1';if(state.profile.placementNeeded){return {lev,weak:'Einstufung',r:RESOURCE_LIBRARY.find(x=>x.id==='goethe-test')}}let m=skillMastery(lev),skills=Object.entries(m).sort((a,b)=>(a[1].a? a[1].pct:-1)-(b[1].a? b[1].pct:-1)),weak=skills[0]?.[0]||'Grammatik',aud=state.profile.ageGroup||'adult',purpose=state.profile.purpose||'general',r=RESOURCE_LIBRARY.find(x=>x.levels.includes(lev)&&x.skills.includes(weak)&&x.audiences.includes(aud)&&x.goals.includes(purpose))||RESOURCE_LIBRARY.find(x=>x.levels.includes(lev)&&x.skills.includes(weak))||RESOURCE_LIBRARY.find(x=>x.levels.includes(lev));return {lev,weak,r}}
function practiceLearningPath(){let levs=['A1','A2','B1','B2','C1','C2'],rec=nextRecommendation(),st=exerciseStats(rec.lev),master=skillMastery(rec.lev),range=levelsBetween(state.profile.currentLevel,state.profile.targetLevel),who=state.profile.name?state.profile.name:'',road={A1:['پایه ارتباطی، تلفظ، جمله‌های ساده و واژگان روزمره','Grundkommunikation, Aussprache, einfache Sätze und Alltagswortschatz'],A2:['تعامل‌های روزمره، گذشته، حالت‌های دستوری و پیام‌های کوتاه','Alltagssituationen, Vergangenheit, Kasus und kurze Mitteilungen'],B1:['استقلال زبانی، متن پیوسته، مکالمه و موضوع‌های آشنا','Selbstständigkeit, zusammenhängende Texte und vertraute Themen'],B2:['متن پیچیده، استدلال، روانی و ترکیب‌های واژگانی','Komplexe Texte, Argumentation, Flüssigkeit und Kollokationen'],C1:['زبان دانشگاهی و حرفه‌ای، دقت، انسجام و بیان ظریف','Akademische/berufliche Sprache, Präzision, Kohärenz und Nuancen'],C2:['سبک، ظرافت معنایی، منابع اصیل و تولید تقریباً بی‌نقص','Stil, Bedeutungsnuancen, authentische Quellen und sehr präziser Output']};return `<div class="learning-hero"><span class="kicker">${t('مسیر آموزشی شخصی‌سازی‌شده','Personalisierter Lernpfad')}</span><h2>${state.profile.currentLevel==='UNKNOWN'?t('تعیین سطح','Einstufung'):state.profile.currentLevel} → ${state.profile.targetLevel||'—'}</h2><p>${pair('تمرین داخلی + منابع معتبر + برنامه زمانی + تولید فعال زبان','Interne Übungen + verlässliche Quellen + Zeitplan + aktiver Sprachoutput')}</p></div><div class="level-ladder">${levs.map(l=>`<div class="level-step ${l===state.profile.currentLevel?'current':''} ${l===state.profile.targetLevel?'target':''}">${l}<small style="display:block">${range.includes(l)?t('در مسیر','im Pfad'):t('مرجع','Referenz')}</small></div>`).join('')}</div>${state.profile.targetLevel?`<div class="card"><h3>${state.profile.targetLevel} · ${pair(road[state.profile.targetLevel][0],road[state.profile.targetLevel][1])}</h3></div>`:''}<div class="card"><div class="section-head"><h3>${t('پیشنهاد بعدی','Nächster sinnvoller Schritt')}</h3><span class="tag">${rec.lev}</span></div>${state.profile.placementNeeded?pair('ابتدا سطح فعلی را با یک آزمون جهت‌یابی معتبر تخمین بزنید. نتیجه را به‌عنوان نقطه شروع ثبت کنید؛ آزمون کوتاه داخل برنامه فقط ابزار تمرین است.','Schätze zuerst dein aktuelles Niveau mit einem seriösen Orientierungstest. Die internen Kurztests dienen nur dem Lernen.'):pair(`ضعیف‌ترین حوزه ثبت‌شده: <b>${moduleName(rec.weak)}</b>. ابتدا یک تمرین کوتاه انجام دهید، سپس یک منبع مناسب همان مهارت را باز کنید.`,`Schwächster erfasster Bereich: <b>${moduleName(rec.weak)}</b>. Mache zuerst eine kurze Übung und öffne danach eine passende Quelle.`)}<div class="path-actions" style="margin-top:10px">${!state.profile.placementNeeded?`<button class="primary" onclick="quickQuiz('${rec.lev}','${rec.weak}')">🧠 ${t('شروع تمرین تطبیقی','Adaptive Übung starten')}</button>`:''}${rec.r?`<button class="ghost" onclick="openResource('${rec.r.id}')">↗ ${esc(rec.r.name)}</button>`:''}</div></div><div class="statgrid"><div class="stat"><b>${num(st.pct)}%</b><span>${t('دقت تمرین هدف','Trefferquote Zielniveau')}</span></div><div class="stat"><b>${num(st.attempts)}</b><span>${t('پاسخ ثبت‌شده','beantwortete Aufgaben')}</span></div><div class="stat"><b>${num(Object.keys(state.learning.resourceLog||{}).length)}</b><span>${t('منبع استفاده‌شده','genutzte Quellen')}</span></div><div class="stat"><b>${num(Object.values(state.learning.vocabProgress||{}).filter(x=>x==='mastered').length)}</b><span>${t('واژه مسلط','gemeisterte Wörter')}</span></div></div><div class="card"><h3>${t('منطق آموزشی بین‌المللی','Didaktisches Kernmodell')}</h3>${pair('هر چرخه شامل هدف روشن، ورودی قابل‌فهم، بازیابی فعال، تولید زبان و بازخورد است. فیلم و پادکست فقط وقتی به زمان مطالعه مؤثر تبدیل می‌شوند که زبان‌آموز از آن‌ها عبارت استخراج کند، خلاصه بسازد یا بازگویی ضبط کند.','Jeder Zyklus umfasst ein klares Ziel, verständlichen Input, aktiven Abruf, Sprachproduktion und Feedback. Film und Podcast zählen als wirksame Lernzeit, wenn Wendungen extrahiert, Zusammenfassungen erstellt oder Nacherzählungen aufgenommen werden.')}</div>`}
function quickQuiz(level,skill){state.learning.exerciseLevel=level;state.learning.exerciseSkill=skill;state.ui.practiceTab='exercise';state.learning.quiz=null;save();renderPractice();startQuiz()}
function practiceExercises(){let lev=state.learning.exerciseLevel||'AUTO',skill=state.learning.exerciseSkill||'ALL';return `<div class="card"><div class="section-head"><h3>${t('تمرین‌های تألیفی داخل برنامه','Eigene Übungen in der App')}</h3><span class="tag free">${t('بدون نیاز به اینترنت','offline')}</span></div><div class="grid2"><div class="field"><label>${t('سطح','Niveau')}</label><select onchange="state.learning.exerciseLevel=this.value;state.learning.quiz=null;save();renderPractice()"><option value="AUTO" ${lev==='AUTO'?'selected':''}>${t('خودکار: سطح هدف','Automatisch: Zielniveau')}</option>${['A1','A2','B1','B2','C1','C2'].map(x=>`<option ${lev===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>${t('مهارت','Fertigkeit')}</label><select onchange="state.learning.exerciseSkill=this.value;state.learning.quiz=null;save();renderPractice()"><option value="ALL" ${skill==='ALL'?'selected':''}>${t('همه','Alle')}</option>${['Grammatik','Wortschatz','Lesen'].map(x=>`<option value="${x}" ${skill===x?'selected':''}>${moduleName(x)}</option>`).join('')}</select></div></div><div class="external-note">${t('این تمرین‌ها برای یادگیری و پایش پیشرفت طراحی شده‌اند و آزمون رسمی تعیین سطح محسوب نمی‌شوند.','Diese Übungen dienen dem Lernen und der Fortschrittskontrolle; sie ersetzen keinen offiziellen Einstufungstest.')}</div></div>${state.learning.quiz?renderExerciseQuiz():renderExerciseStart()}${renderOutputPrompts()}`}
function renderExerciseStart(){let level=state.learning.exerciseLevel==='AUTO'?state.profile.targetLevel:state.learning.exerciseLevel,skill=state.learning.exerciseSkill,rows=EXERCISE_BANK.filter(x=>x.level===level&&(skill==='ALL'||x.skill===skill)),st=exerciseStats(level);return `<div class="quiz-card empty-state"><div style="font-size:44px">🧠</div><h3>${t('جلسه تمرین تطبیقی','Adaptive Übungseinheit')}</h3>${pair(`سطح ${level} · ${skill==='ALL'?'ترکیبی':moduleName(skill)} · ${rows.length} سؤال موجود`,`Niveau ${level} · ${skill==='ALL'?'gemischt':moduleName(skill)} · ${rows.length} Aufgaben verfügbar`)}<p class="muted">${t('در هر جلسه حداکثر ۱۰ سؤال به‌صورت تصادفی انتخاب می‌شود.','Pro Sitzung werden bis zu 10 Aufgaben zufällig ausgewählt.')}</p><button class="primary" onclick="startQuiz()">${t('شروع جلسه','Sitzung starten')}</button><div class="small muted" style="margin-top:10px">${t('دقت قبلی این سطح','Bisherige Trefferquote')}: ${num(st.pct)}%</div></div>`}
function shuffle(a){let x=[...a];for(let i=x.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
function startQuiz(){let level=state.learning.exerciseLevel==='AUTO'?state.profile.targetLevel:state.learning.exerciseLevel,skill=state.learning.exerciseSkill||'ALL',rows=EXERCISE_BANK.filter(x=>x.level===level&&(skill==='ALL'||x.skill===skill));if(!rows.length){toast(t('برای این فیلتر سؤالی وجود ندارد','Keine Aufgaben für diesen Filter'));return}state.learning.quiz={ids:shuffle(rows).slice(0,10).map(x=>x.id),index:0,score:0,answered:false,choice:null,startedAt:new Date().toISOString()};save();renderPractice()}
function currentExercise(){let q=state.learning.quiz;if(!q)return null;return EXERCISE_BANK.find(x=>x.id===q.ids[q.index])}
function renderExerciseQuiz(){let q=state.learning.quiz;if(q.done)return renderQuizSummary();let x=currentExercise();if(!x)return renderExerciseStart();let pct=Math.round((q.index)/q.ids.length*100);return `<div class="quiz-card"><div class="section-head"><span class="tag">${x.level} · ${moduleName(x.skill)}</span><b>${num(q.index+1)}/${num(q.ids.length)}</b></div><div class="quiz-progress"><i style="width:${pct}%"></i></div><h3>${pair(esc(x.qfa),esc(x.qde))}</h3><div>${x.options.map((o,i)=>`<button class="option ${q.answered?(i===x.answer?'correct':i===q.choice?'wrong':''):''}" ${q.answered?'disabled':''} onclick="answerExercise(${i})"><span class="ltr">${esc(o)}</span></button>`).join('')}</div>${q.answered?`<div class="explain">${pair(esc(x.efa),esc(x.ede))}</div><button class="primary" style="width:100%" onclick="nextExercise()">${q.index+1===q.ids.length?t('نمایش نتیجه','Ergebnis anzeigen'):t('سؤال بعدی','Nächste Aufgabe')}</button>`:''}</div>`}
function answerExercise(choice){let q=state.learning.quiz;if(!q||q.answered)return;let x=currentExercise(),ok=choice===x.answer,p=state.learning.exerciseProgress[x.id]||{attempts:0,correct:0};p.attempts++;if(ok){p.correct++;q.score++}p.last=new Date().toISOString();state.learning.exerciseProgress[x.id]=p;q.answered=true;q.choice=choice;save();renderPractice()}
function nextExercise(){let q=state.learning.quiz;if(q.index+1>=q.ids.length){q.done=true;q.finishedAt=new Date().toISOString()}else{q.index++;q.answered=false;q.choice=null}save();renderPractice()}
function renderQuizSummary(){let q=state.learning.quiz,pct=Math.round(q.score/q.ids.length*100);return `<div class="quiz-card session-summary"><div class="score">${num(q.score)}/${num(q.ids.length)}</div><h3>${pct>=80?t('تسلط خوب','Gute Beherrschung'):pct>=60?t('در حال پیشرفت','Auf gutem Weg'):t('نیازمند مرور','Wiederholung nötig')}</h3><p>${t('دقت جلسه','Trefferquote')}: ${num(pct)}%</p><div class="path-actions"><button class="primary" onclick="state.learning.quiz=null;save();startQuiz()">${t('جلسه جدید','Neue Sitzung')}</button><button class="ghost" onclick="state.learning.quiz=null;save();renderPractice()">${t('بازگشت','Zurück')}</button></div></div>`}
function renderOutputPrompts(){let level=state.learning.exerciseLevel==='AUTO'?state.profile.targetLevel:state.learning.exerciseLevel,rows=OUTPUT_PROMPTS.filter(x=>x.level===level);return `<div class="card prompt-box"><div class="section-head"><h3>${t('تولید زبان','Sprachproduktion')}</h3><span class="tag">${level}</span></div>${rows.map(p=>`<div class="resource-card"><b>${p.skill==='Schreiben'?'✍️':'🗣️'} ${moduleName(p.skill)}</b>${pair(esc(p.fa),esc(p.de))}<div class="small muted">${t('زمان پیشنهادی','Empfohlene Zeit')}: ${num(p.minutes)} ${t('دقیقه','Min.')}</div><button class="ghost" style="margin-top:8px" onclick="openPrompt('${p.id}')">${t('بازکردن کاربرگ','Arbeitsblatt öffnen')}</button></div>`).join('')}</div>`}
function openPrompt(id){let p=OUTPUT_PROMPTS.find(x=>x.id===id),old=state.learning.promptLog[id]||{};document.getElementById('customTaskModal').classList.add('show');document.getElementById('customTaskSheet').innerHTML=`<button class="iconbtn close" onclick="closeModal('customTaskModal')">×</button><h3>${p.skill==='Schreiben'?'✍️':'🗣️'} ${moduleName(p.skill)} · ${p.level}</h3>${pair(esc(p.fa),esc(p.de))}<div class="field"><label>${p.skill==='Schreiben'?t('متن پاسخ','Antworttext'):t('یادداشت ارائه و بازخورد','Notizen und Feedback')}</label><textarea id="promptText">${esc(old.text||'')}</textarea></div><div class="rubric">${[['task','انجام تکلیف','Aufgabe'],['coherence','انسجام','Kohärenz'],['vocab','واژگان','Wortschatz'],['grammar','گرامر','Grammatik']].map(r=>`<label>${t(r[1],r[2])}<input id="rub-${r[0]}" type="number" min="1" max="5" value="${old[r[0]]||3}"></label>`).join('')}</div><button class="primary" style="width:100%;margin-top:12px" onclick="savePrompt('${id}')">${t('ذخیره کاربرگ','Arbeitsblatt speichern')}</button>`}
function savePrompt(id){let v=k=>Number(document.getElementById('rub-'+k).value||3);state.learning.promptLog[id]={text:document.getElementById('promptText').value,task:v('task'),coherence:v('coherence'),vocab:v('vocab'),grammar:v('grammar'),savedAt:new Date().toISOString()};save(true);closeModal('customTaskModal');renderPractice()}
function practiceVocab(){let lev=state.learning.vocabLevel||'AUTO',actual=lev==='AUTO'?(state.profile.targetLevel||'A1'):lev,theme=state.learning.vocabTheme||'ALL',q=(state.learning.vocabSearch||'').trim().toLowerCase(),themes=[...new Set(VOCAB_BANK.map(x=>x.theme))],rows=VOCAB_BANK.filter(x=>(lev==='ALL'||x.level===actual)&&(theme==='ALL'||x.theme===theme)&&(!q||[x.word,x.fa,x.example,x.article,x.plural].join(' ').toLowerCase().includes(q))),mastered=Object.values(state.learning.vocabProgress||{}).filter(x=>x==='mastered').length;return `<div class="card"><div class="section-head"><h3>${t('واژگان سطح‌بندی‌شده A1 تا C2','Niveauwortschatz A1 bis C2')}</h3><span class="tag free">${num(VOCAB_BANK.length)} ${t('مدخل','Einträge')}</span></div><div class="grid3"><div class="field"><label>${t('سطح','Niveau')}</label><select onchange="state.learning.vocabLevel=this.value;save();renderPractice()"><option value="AUTO" ${lev==='AUTO'?'selected':''}>${t('سطح هدف','Zielniveau')}</option><option value="ALL" ${lev==='ALL'?'selected':''}>${t('همه','Alle')}</option>${['A1','A2','B1','B2','C1','C2'].map(x=>`<option ${lev===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>${t('موضوع','Thema')}</label><select onchange="state.learning.vocabTheme=this.value;save();renderPractice()"><option value="ALL">${t('همه موضوع‌ها','Alle Themen')}</option>${themes.map(x=>`<option ${theme===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>${t('جست‌وجو','Suche')}</label><input value="${esc(state.learning.vocabSearch||'')}" oninput="state.learning.vocabSearch=this.value;save();renderPractice()" placeholder="Wort / معنی / Beispiel"></div></div><div class="small muted">${t('قاعده برنامه: اسم‌ها با حرف تعریف و جمع، فعل‌ها با ساخت و واژه‌های پیشرفته با ترکیب و مثال یاد گرفته می‌شوند.','App-Regel: Nomen mit Artikel/Plural, Verben mit Struktur und fortgeschrittene Wörter mit Kollokation/Beispiel lernen.')} · ${num(mastered)} ${t('مسلط','gemeistert')}</div></div>${renderCustomVocab()}<div class="vocab-grid">${rows.map(vocabCard).join('')}</div>`}
function vocabCard(v){let status=state.learning.vocabProgress[v.id]||'new',label=status==='mastered'?t('مسلط','gemeistert'):status==='learning'?t('در حال یادگیری','in Arbeit'):t('جدید','neu');let spoken=((v.article?v.article+' ':'')+v.word).trim();return `<div class="resource-card vocab-card ${status}"><div class="resource-top"><div><span class="tag">${v.level} · ${esc(v.theme)}</span><div style="display:flex;align-items:center;gap:7px;margin-top:8px"><h3 class="ltr" style="margin:0">${v.article?esc(v.article)+' ':''}${esc(v.word)}</h3><button class="speak-btn" onclick='speakGerman(${JSON.stringify(spoken)})'>🔊</button></div>${v.plural?`<div class="small ltr">Plural: ${esc(v.plural)}</div>`:''}</div><span class="tag ${status==='mastered'?'free':''}">${label}</span></div><p>${esc(v.fa)}</p><div class="external-note ltr" style="display:flex;justify-content:space-between;gap:6px;align-items:center"><span>${esc(v.example)}</span><button class="speak-btn" onclick='speakGerman(${JSON.stringify(v.example)})'>🔊</button></div><div class="actions" style="margin:8px 0"><button class="ghost" onclick="openDuden('${encodeURIComponent(v.word)}')">Duden ↗</button></div><div class="grid3"><button class="ghost" onclick="markVocab('${v.id}','new')">${t('جدید','Neu')}</button><button class="ghost" onclick="markVocab('${v.id}','learning')">${t('مرور','Lernen')}</button><button class="primary" onclick="markVocab('${v.id}','mastered')">${t('بلدم','Kann ich')}</button></div></div>`}

function practicePersianGuide(){return `<div class="learning-hero"><span class="kicker">${t('راهنمای ویژه فارسی‌زبانان','Guide für Persischsprachige')}</span><h2>${t('از ترجمه کلمه‌به‌کلمه به الگوی طبیعی آلمانی','Von Wort-für-Wort zu natürlichem Deutsch')}</h2><p>${pair('خطاهای رایج فارسی‌زبانان و روش عملی اصلاح آن‌ها','Typische Transferfehler und konkrete Korrekturstrategien')}</p></div>${PERSIAN_GUIDES.map(g=>`<div class="card"><div class="section-head"><h3>${esc(g.id.replaceAll('-',' '))}</h3><span class="tag">${g.level}</span></div>${pair(esc(g.fa),esc(g.de))}</div>`).join('')}`}

function speakGerman(text){try{if(!('speechSynthesis' in window))return toast(t('پخش صوت در این مرورگر در دسترس نیست','Sprachausgabe ist in diesem Browser nicht verfügbar'));speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(String(text||''));u.lang='de-DE';u.rate=.9;let vs=speechSynthesis.getVoices(),v=vs.find(x=>/^de(-|_)/i.test(x.lang));if(v)u.voice=v;speechSynthesis.speak(u)}catch(e){toast(t('پخش تلفظ ممکن نشد','Aussprache konnte nicht abgespielt werden'))}}

function renderCustomVocab(){let rows=state.learning.customVocab||[];if(!rows.length)return '';return `<div class="card custom-vocab"><div class="section-head"><h3>${t('واژگان شخصی من','Mein persönlicher Wortschatz')}</h3><span class="chip">${num(rows.length)}</span></div>${rows.slice().reverse().slice(0,20).map(v=>`<div class="resource"><div class="meta"><b class="ltr">${esc(v.word)}</b><small>${esc(v.fa||'')} · ${esc(v.source||'')}</small></div><div class="actions" style="flex:none"><button class="speak-btn" onclick='speakGerman(${JSON.stringify(v.word)})'>🔊</button><button class="danger" onclick="state.learning.customVocab=state.learning.customVocab.filter(x=>x.id!=='${v.id}');save();renderPractice()">×</button></div></div>`).join('')}</div>`}
function podcastResources(){let level=state.profile.currentLevel==='UNKNOWN'?(state.profile.targetLevel||'A1'):(state.profile.currentLevel||'A1');return RESOURCE_LIBRARY.filter(r=>r.levels.includes(level)&&(r.skills.includes('Podcast')||r.skills.includes('Hören')||r.skills.includes('Nachrichten'))).sort((a,b)=>(b.official?1:0)-(a.official?1:0)).slice(0,10)}
function practicePodcast(){let rows=podcastResources();return `<div class="card podcast-card"><div class="section-head"><div><span class="kicker">Podcast Hub</span><h3>${t('شنیدار متصل به برنامه شخصی','Hören mit persönlichem Lernfluss')}</h3></div><span class="tag">${state.profile.currentLevel==='UNKNOWN'?(state.profile.targetLevel||'A1'):state.profile.currentLevel}</span></div>${pair('یک منبع متناسب با سطح باز کنید، با Focus زمان را ثبت کنید و واژه‌های تازه را مستقیماً به بانک شخصی خود بفرستید.','Öffne eine passende Quelle, erfasse die Zeit mit Focus und übernimm neue Wörter direkt in deinen persönlichen Wortschatz.')}<div class="capture-row"><div class="field"><label>${t('واژه/عبارت جدید','Neues Wort / Wendung')}</label><input id="pvWord" class="ltr" placeholder="z. B. die Herausforderung"></div><div class="field"><label>${t('معنی یا یادداشت','Bedeutung / Notiz')}</label><input id="pvMeaning" placeholder="چالش"></div><button class="primary" onclick="captureVocabFromPodcast()">＋</button></div><div class="actions"><button class="primary" onclick="state.focus.module='Hören';setFocusPreset(25,5);startFocusTimer()">▶ 25m ${t('شروع شنیدار','Hören starten')}</button><button class="ghost" onclick="state.ui.practiceTab='vocab';save();renderPractice()">📚 ${t('واژگان من','Meine Wörter')}</button></div></div><div class="card"><h3>${t('پروتکل پیشنهادی','Empfohlenes Protokoll')}</h3>${pair('۱) یک بار بدون توقف گوش دهید. ۲) بار دوم نکته بردارید. ۳) سه نکته اصلی را خلاصه کنید. ۴) ۳ تا ۵ واژه یا عبارت به بانک واژگان اضافه کنید.','1) Einmal ohne Pause hören. 2) Beim zweiten Hören Notizen machen. 3) Drei Kernpunkte zusammenfassen. 4) 3–5 Wörter oder Wendungen speichern.')}</div>${rows.map(r=>`<div class="resource-card podcast-card"><div class="resource-top"><div><span class="tag ${r.official?'official':''}">${r.provider}</span><h3>${esc(r.name)}</h3></div><span class="tag ${r.cost==='free'?'free':'freemium'}">${r.cost==='free'?t('رایگان','kostenlos'):'Freemium'}</span></div><p>${state.lang==='de'?esc(r.de):esc(r.fa)}</p><button class="primary" style="width:100%" onclick="openResource('${r.id}')">🎧 ${t('بازکردن منبع','Quelle öffnen')} ↗</button></div>`).join('')}`}
function practicePronunciation(){return `<div class="card pron-card"><div class="section-head"><div><span class="kicker">Aussprache Lab</span><h3>${t('تلفظ و تکرار آلمانی','Deutsche Aussprache & Nachsprechen')}</h3></div><span class="tag free">TTS</span></div>${pair('واژه یا جمله کوتاه را وارد کنید، تلفظ آلمانی را بشنوید و چند بار تقلید کنید. برای بازخورد تخصصی از مربی رسمی تلفظ Goethe استفاده کنید.','Gib ein kurzes Wort oder einen Satz ein, höre die deutsche Aussprache und sprich mehrfach nach. Für professionelles Feedback nutze den offiziellen Goethe-Aussprachetrainer.')}<div class="field"><label>${t('واژه یا جمله','Wort oder Satz')}</label><textarea id="pronText" class="ltr" placeholder="Ich möchte meine Aussprache verbessern."></textarea></div><div class="actions"><button class="primary" onclick="speakGerman(document.getElementById('pronText').value)">🔊 ${t('پخش تلفظ','Aussprache hören')}</button><button class="ghost" onclick="state.focus.module='Sprechen';setFocusPreset(15,3);startFocusTimer()">▶ 15m ${t('تمرین تلفظ','Aussprachetraining')}</button></div></div><div class="card"><h3>${t('چرخه تمرین','Übungszyklus')}</h3>${pair('گوش‌دادن → تکرار جمله کامل → ضبط با Voice Memos گوشی → بازشنوی → اصلاح ریتم و واکه‌ها','Hören → ganzen Satz nachsprechen → mit der Sprachmemo-App aufnehmen → anhören → Rhythmus und Vokale korrigieren')}<button class="primary" style="width:100%;margin-top:10px" onclick="openResource('goethe-pron')">Goethe Aussprachetrainer ↗</button></div>`}
function resourceRouterCard(){let rec=nextRecommendation(),lev=state.profile.currentLevel==='UNKNOWN'?(state.profile.targetLevel||'A1'):(state.profile.currentLevel||'A1'),weak=rec.weak==='Einstufung'?'Hören':rec.weak,rows=RESOURCE_LIBRARY.filter(r=>r.levels.includes(lev)&&r.skills.includes(weak)).slice(0,3);return `<div class="card"><div class="section-head"><h3>${t('مسیریاب هوشمند منابع','Intelligenter Quellen-Router')}</h3><span class="chip">${lev} · ${moduleName(weak)}</span></div>${pair('بر اساس سطح و ضعیف‌ترین مهارت ثبت‌شده، این منابع برای شروع مناسب‌ترند.','Basierend auf Niveau und schwächster erfasster Fertigkeit sind diese Quellen ein sinnvoller Start.')}<div class="router-grid" style="margin-top:9px">${rows.map(r=>`<button class="ghost" onclick="openResource('${r.id}')">↗ ${esc(r.name)}</button>`).join('')||`<button class="ghost" onclick="openResource('goethe-dfd')">↗ Deutsch für dich</button>`}</div></div>`}

function practiceResources(){let level=state.learning.resourceLevel||'AUTO',skill=state.learning.resourceSkill||'ALL',provider=state.learning.resourceProvider||'ALL',cost=state.learning.resourceCost||'ALL',aud=state.learning.resourceAudience||'AUTO',actual=level==='AUTO'?(state.profile.targetLevel||'A1'):level,audience=aud==='AUTO'?(state.profile.ageGroup||'adult'):aud,providers=[...new Set(RESOURCE_LIBRARY.map(x=>x.provider))],rows=RESOURCE_LIBRARY.filter(x=>(level==='ALL'||x.levels.includes(actual))&&(skill==='ALL'||x.skills.includes(skill))&&(provider==='ALL'||x.provider===provider)&&(cost==='ALL'||x.cost===cost)&&(aud==='ALL'||x.audiences.includes(audience)));return `<div class="card"><div class="section-head"><h3>${t('کتابخانه منابع معتبر آلمانی','Bibliothek verlässlicher deutschsprachiger Quellen')}</h3><span class="tag free">${num(rows.length)} / ${num(RESOURCE_LIBRARY.length)}</span></div><div class="grid3"><div class="field"><label>${t('سطح','Niveau')}</label><select onchange="state.learning.resourceLevel=this.value;save();renderPractice()"><option value="AUTO" ${level==='AUTO'?'selected':''}>${t('سطح هدف','Zielniveau')}</option><option value="ALL" ${level==='ALL'?'selected':''}>${t('همه سطوح','Alle Niveaus')}</option>${['A1','A2','B1','B2','C1','C2'].map(x=>`<option ${level===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>${t('مهارت/کاربرد','Fertigkeit/Zweck')}</label><select onchange="state.learning.resourceSkill=this.value;save();renderPractice()"><option value="ALL">${t('همه','Alle')}</option>${['Lesen','Hören','Schreiben','Sprechen','Grammatik','Wortschatz','Aussprache','Prüfung','Einstufung','Podcast','Video','Nachrichten','Beruf','Studium'].map(x=>`<option value="${x}" ${skill===x?'selected':''}>${moduleName(x)}</option>`).join('')}</select></div><div class="field"><label>${t('مخاطب','Zielgruppe')}</label><select onchange="state.learning.resourceAudience=this.value;save();renderPractice()"><option value="AUTO" ${aud==='AUTO'?'selected':''}>${t('پروفایل من','Mein Profil')}</option><option value="ALL" ${aud==='ALL'?'selected':''}>${t('همه','Alle')}</option><option value="child" ${aud==='child'?'selected':''}>${t('کودک','Kind')}</option><option value="teen" ${aud==='teen'?'selected':''}>${t('نوجوان','Jugendliche')}</option><option value="adult" ${aud==='adult'?'selected':''}>${t('بزرگسال','Erwachsene')}</option></select></div><div class="field"><label>${t('ارائه‌دهنده','Anbieter')}</label><select onchange="state.learning.resourceProvider=this.value;save();renderPractice()"><option value="ALL">${t('همه','Alle')}</option>${providers.map(x=>`<option ${provider===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>${t('هزینه','Kosten')}</label><select onchange="state.learning.resourceCost=this.value;save();renderPractice()"><option value="ALL">${t('همه','Alle')}</option><option value="free" ${cost==='free'?'selected':''}>${t('کاملاً رایگان','kostenlos')}</option><option value="freemium" ${cost==='freemium'?'selected':''}>Freemium</option></select></div></div><div class="external-note">${t('برچسب «رسمی» یعنی منبع متعلق به مؤسسه یا رسانه ارائه‌دهنده است. «Freemium» یعنی بخش پایه رایگان است اما ممکن است امکانات تکمیلی هزینه داشته باشد. لینک‌ها در ژوئیه ۲۰۲۶ بازبینی شده‌اند.','„Offiziell“ bezeichnet die Quelle des jeweiligen Instituts/Mediums. „Freemium“ bedeutet: Grundangebot frei, Extras eventuell kostenpflichtig. Links zuletzt im Juli 2026 geprüft.')}</div></div>${rows.length?rows.map(renderResourceCard).join(''):`<div class="card empty-state">${t('منبعی با این فیلتر پیدا نشد.','Keine Quelle für diesen Filter gefunden.')}</div>`}${renderSponsor()}`}
function renderResourceCard(r){let log=state.learning.resourceLog[r.id]||{},cost=r.cost==='free'?t('رایگان','kostenlos'):'Freemium';return `<div class="resource-card"><div class="resource-top"><div><h3>${esc(r.name)}</h3><div class="provider">${esc(r.provider)}</div></div><div class="tags"><span class="tag ${r.cost==='free'?'free':''}">${cost}</span>${r.official?`<span class="tag official">${t('رسمی','offiziell')}</span>`:''}</div></div>${pair(esc(r.fa),esc(r.de))}<div class="tags">${r.levels.map(x=>`<span class="tag">${x}</span>`).join('')}${r.skills.slice(0,5).map(x=>`<span class="tag">${moduleName(x)}</span>`).join('')}</div><div class="resource-actions"><a href="${r.url}" target="_blank" rel="noopener" onclick="trackResource('${r.id}')">${t('بازکردن منبع مستقیم','Direkt öffnen')} ↗</a><span class="small muted">${log.opens?`${num(log.opens)}×`:t('استفاده‌نشده','noch nicht genutzt')}</span></div></div>`}
function trackResource(id){let x=state.learning.resourceLog[id]||{opens:0};x.opens++;x.last=new Date().toISOString();state.learning.resourceLog[id]=x;save()}
function openResource(id){let r=RESOURCE_LIBRARY.find(x=>x.id===id);if(!r)return;trackResource(id);window.open(r.url,'_blank','noopener')}
function practiceCards(){let today=iso(new Date()),due=CARDS.map((c,i)=>({c,i,p:state.cards[i]||{next:today,box:1}})).filter(x=>x.p.next<=today),x=due[0];if(!x)return `<div class="card empty">${t('مرور امروز تمام شد.','Die heutige Wiederholung ist erledigt.')}</div>`;return `<div class="card" style="text-align:center"><span class="kicker">${t('مرور فاصله‌دار','Verteilte Wiederholung')}</span><h2 class="ltr">${x.c[0]}</h2><p>${x.c[1]}</p><div class="grid3"><button class="danger" onclick="reviewCard(${x.i},0)">${t('دوباره','Nochmal')}</button><button class="ghost" onclick="reviewCard(${x.i},1)">${t('سخت','Schwer')}</button><button class="primary" onclick="reviewCard(${x.i},3)">${t('خوب','Gut')}</button></div></div>`}
function reviewCard(i,days){let p=state.cards[i]||{box:1};p.box=days===0?1:Math.min(5,p.box+1);p.next=iso(addDays(new Date(),days===3?[0,1,3,7,14,30][p.box]:days));state.cards[i]=p;save();renderPractice()}
function practiceMethods(){let level=state.profile.targetLevel||state.profile.currentLevel||'A1',rows=METHOD_LIBRARY.filter(m=>m.levels.includes(level)||state.profile.currentLevel==='UNKNOWN');return `<div class="card"><span class="kicker">${t('روش‌های یادگیری و رویکردهای آموزشی','Lernmethoden & Lehransätze')}</span><h3>${t('روش را با هدف ترکیب کنید، نه اینکه کورکورانه یک متد را دنبال کنید','Methoden passend zum Ziel kombinieren')}</h3>${pair('هر کارت توضیح می‌دهد این رویکرد کجا مفید است. نسبت‌دادن نام افراد فقط براساس منبع عمومی انجام شده و روش‌های پژوهشی از رویکرد مدرس‌ها جدا نمایش داده می‌شوند.','Jede Karte erklärt den sinnvollen Einsatz. Personenbezogene Zuschreibungen beruhen auf öffentlichen Quellen; Forschungsansätze werden von Lehreransätzen getrennt dargestellt.')}</div>${rows.map(m=>`<div class="method-card"><div class="method-head"><div><span class="tag ${m.kind==='research'?'official':''}">${m.kind==='teacher'?t('رویکرد مدرس','Lehransatz'):m.kind==='research'?t('پژوهش یادگیری','Lernforschung'):t('تکنیک تمرینی','Übungstechnik')}</span><h3>${esc(state.lang==='de'?m.de:m.name)}</h3></div><span class="tag">${m.levels.join('–')}</span></div>${pair(m.fa,m.deText)}<ol class="method-steps">${(state.lang==='de'?m.stepsDe:m.stepsFa).map(x=>`<li>${esc(x)}</li>`).join('')}</ol><a class="method-source" href="${m.url}" target="_blank" rel="noopener">${t('مشاهده منبع/صفحه مرتبط','Quelle / zugehörige Seite öffnen')} ↗</a></div>`).join('')}`}
function practiceMedia(){let media=RESOURCE_LIBRARY.filter(x=>x.skills.some(s=>['Podcast','Video','Medien','Nachrichten'].includes(s)));return `<div class="notice">${pair('فیلم، پادکست، موسیقی و Shadowing در این بخش روش‌های عمومی یادگیری هستند و به هیچ کانال تبلیغاتی وابسته نیستند. منبع را خود زبان‌آموز انتخاب می‌کند.','Film, Podcast, Musik und Shadowing sind hier allgemeine Lernmethoden und mit keinem beworbenen Kanal verbunden. Die Lernenden wählen ihre Quelle selbst.')}</div><div class="practice-grid"><div class="card"><h3>🎬 ${t('پروتکل فیلم دوبله','Synchronfilm-Protokoll')}</h3>${pair('۲۰ دقیقه فیلم → ۸ عبارت → بازپخش بدون زیرنویس → بازگویی ۹۰ ثانیه‌ای','20 Min. Film → 8 Wendungen → ohne Untertitel → 90 Sek. nacherzählen')}<button class="primary" style="width:100%;margin-top:10px" onclick="addMediaToday('Film')">${t('افزودن به امروز','Für heute hinzufügen')}</button></div><div class="card"><h3>🎙️ ${t('پروتکل پادکست','Podcast-Protokoll')}</h3>${pair('یک بار کلی → بار دوم یادداشت → سه نکته کلیدی → خلاصه شفاهی','Einmal global → Notizen → drei Kernpunkte → mündliche Zusammenfassung')}<button class="primary" style="width:100%;margin-top:10px" onclick="addMediaToday('Podcast')">${t('افزودن به امروز','Für heute hinzufügen')}</button></div><div class="card"><h3>🎵 ${t('پروتکل آهنگ','Lied-Protokoll')}</h3>${pair('متن ناقص → شنیدن → تکمیل → تقلید تلفظ → پنج عبارت','Lückentext → hören → ergänzen → Aussprache imitieren → fünf Wendungen')}<button class="primary" style="width:100%;margin-top:10px" onclick="addMediaToday('Musik')">${t('افزودن به امروز','Für heute hinzufügen')}</button></div><div class="card"><h3>🔁 Shadowing</h3>${pair('۵ دقیقه شنیدن و تکرار همزمان؛ سپس ضبط و مقایسه ریتم و تلفظ','5 Minuten gleichzeitig nachsprechen; dann Aufnahme und Vergleich')}<button class="primary" style="width:100%;margin-top:10px" onclick="addMediaToday('Shadowing')">${t('افزودن به امروز','Für heute hinzufügen')}</button></div></div><div class="card"><h3>${t('منابع پیشنهادی رسانه‌ای','Empfohlene Medienquellen')}</h3>${media.slice(0,6).map(r=>`<button class="ghost" style="width:100%;margin:5px 0;text-align:start" onclick="openResource('${r.id}')">↗ ${esc(r.name)} · ${r.levels.join('/')}</button>`).join('')}</div>`}
function addMediaToday(mid){let d=iso(new Date()),w=weekIndex(parseDate(d));state.customTasks.push({id:'c'+uid(),date:d,week:w,day:0,start:'',end:'',minutes:45,module:mid,theme:['فعالیت انتخابی','Gewählte Aktivität'],phase:['تمرین آزاد','Freies Training']});save();state.ui.selectedDate=d;go('today')}

function renderReport(){let tab=state.ui.reportTab,b=[['overview','خلاصه','Übersicht'],['time','زمان مطالعه','Lernzeit'],['weeks','هفته‌ها','Wochen'],['exams','آزمون','Prüfungen']];let body=tab==='overview'?reportOverview():tab==='time'?reportTime():tab==='weeks'?reportWeeks():reportExams();document.getElementById('view-report').innerHTML=`<div class="section-head"><h2>${t('گزارش پیشرفت','Fortschrittsbericht')}</h2><button class="ghost" onclick="window.print()">${t('چاپ','Drucken')}</button></div><div class="week-tabs">${b.map(x=>`<button class="${tab===x[0]?'active':''}" onclick="state.ui.reportTab='${x[0]}';save();renderReport()">${t(x[1],x[2])}</button>`).join('')}</div>${body}`}
function reportOverview(){let p=planStats(),mods={};state.plan.sessions.concat(state.customTasks).forEach(x=>{let m=effectiveModule(x);mods[m]??={t:0,d:0};mods[m].t++;if(taskDone(x.id))mods[m].d++});return `<div class="statgrid"><div class="stat"><b>${num(p.pct)}%</b><span>${t('پیشرفت کل','Gesamtfortschritt')}</span></div><div class="stat"><b>${num(p.done)}</b><span>${t('فعالیت تکمیل‌شده','erledigte Aufgaben')}</span></div><div class="stat"><b>${num(Math.round(p.mins/60*10)/10)}</b><span>${t('ساعت واقعی','Ist-Stunden')}</span></div><div class="stat"><b>${num(state.exams.length)}</b><span>${t('آزمون ثبت‌شده','Prüfungen')}</span></div></div><div class="card"><h3>${t('پیشرفت بر اساس فعالیت','Fortschritt nach Aktivität')}</h3>${Object.entries(mods).map(([k,v])=>`<div class="scorebar"><span>${moduleName(k)}</span><div class="bar"><i style="width:${Math.round(v.d/v.t*100)}%"></i></div><b>${num(Math.round(v.d/v.t*100))}%</b></div>`).join('')||`<div class="empty">${t('تقویم را تولید کنید.','Erstelle zuerst den Kalender.')}</div>`}</div><button class="primary" style="width:100%" onclick="openExam()">＋ ${t('ثبت نتیجه آزمون','Prüfungsergebnis')}</button>`}
function reportWeeks(){return Array.from({length:state.plan.weeks||0},(_,i)=>{let s=weekStats(i+1),p=phaseFor(i+1,state.plan.weeks);return `<div class="card"><div class="section-head"><div><b>${t('هفته','Woche')} ${num(i+1)}</b><div class="small muted">${pair(p.fa,p.de)}</div></div><span class="chip">${num(s.pct)}%</span></div><div class="progress"><i style="width:${s.pct}%"></i></div><div class="small muted">${num(Math.round(s.mins/60*10)/10)} / ${num(Math.round(s.planned/60*10)/10)} h</div></div>`}).join('')}
function reportExams(){return `<button class="primary" style="width:100%" onclick="openExam()">＋ ${t('ثبت آزمون','Prüfung eintragen')}</button>${state.exams.slice().reverse().map(e=>`<div class="card"><div class="section-head"><b>${esc(e.title)}</b><span class="chip">${dateText(new Date(e.date),true)}</span></div>${['Lesen','Hören','Schreiben','Sprechen'].map(k=>`<div class="scorebar"><span>${moduleName(k)}</span><div class="bar"><i style="width:${Number(e[k]||0)}%"></i></div><b>${num(e[k]||0)}%</b></div>`).join('')}<p class="small muted">${esc(e.note||'')}</p></div>`).join('')||`<div class="card empty">${t('هنوز آزمونی ثبت نشده است.','Noch keine Prüfung eingetragen.')}</div>`}`}
function openExam(){document.getElementById('examModal').classList.add('show');document.getElementById('examSheet').innerHTML=`<button class="iconbtn close" onclick="closeModal('examModal')">×</button><h3>${t('ثبت نتیجه آزمون','Prüfungsergebnis')}</h3><div class="field"><label>${t('عنوان','Titel')}</label><input id="eTitle" value="${esc(state.profile.exam)}"></div><div class="grid2">${['Lesen','Hören','Schreiben','Sprechen'].map(k=>`<div class="field"><label>${moduleName(k)}</label><input id="e${k}" type="number" min="0" max="100" placeholder="%"></div>`).join('')}</div><div class="field"><label>${t('یادداشت','Notiz')}</label><textarea id="eNote"></textarea></div><button class="primary" style="width:100%" onclick="saveExam()">${t('ذخیره','Speichern')}</button>`}
function saveExam(){let e={id:uid(),date:new Date().toISOString(),title:document.getElementById('eTitle').value.trim(),note:document.getElementById('eNote').value.trim()};['Lesen','Hören','Schreiben','Sprechen'].forEach(k=>e[k]=document.getElementById('e'+k).value);state.exams.push(e);save();closeModal('examModal');renderReport();renderHome()}
function openCustomTask(date){document.getElementById('customTaskModal').classList.add('show');document.getElementById('customTaskSheet').innerHTML=`<button class="iconbtn close" onclick="closeModal('customTaskModal')">×</button><h3>${t('افزودن فعالیت شخصی','Eigene Aufgabe')}</h3><input type="hidden" id="ctDate" value="${date}"><div class="field"><label>${t('نوع فعالیت','Aktivität')}</label><select id="ctModule">${moduleOptions('Film')}</select></div><div class="grid2"><div class="field"><label>${t('شروع','Start')}</label><input id="ctStart" type="time" value="18:00"></div><div class="field"><label>${t('دقیقه','Minuten')}</label><input id="ctMin" type="number" value="45"></div></div><button class="primary" style="width:100%" onclick="saveCustomTask()">${t('افزودن','Hinzufügen')}</button>`}
function saveCustomTask(){let date=document.getElementById('ctDate').value,d=parseDate(date);state.customTasks.push({id:'c'+uid(),date,week:weekIndex(d),day:0,start:document.getElementById('ctStart').value,end:'',minutes:Number(document.getElementById('ctMin').value||45),module:document.getElementById('ctModule').value,theme:['فعالیت شخصی','Eigene Aktivität'],phase:['تمرین آزاد','Freies Training']});save();closeModal('customTaskModal');renderToday()}

function div(a,b){return ~~(a/b)} function mod(a,b){return a-~~(a/b)*b}
function jalCal(jy,withoutLeap){let breaks=[-61,9,38,199,426,686,756,818,1111,1181,1210,1635,2060,2097,2192,2262,2324,2394,2456,3178],bl=breaks.length,gy=jy+621,leapJ=-14,jp=breaks[0],jm,jump,leap,leapG,march,n,i;if(jy<jp||jy>=breaks[bl-1])throw new Error('Invalid Jalaali year '+jy);for(i=1;i<bl;i+=1){jm=breaks[i];jump=jm-jp;if(jy<jm)break;leapJ=leapJ+div(jump,33)*8+div(mod(jump,33),4);jp=jm}n=jy-jp;leapJ=leapJ+div(n,33)*8+div(mod(n,33)+3,4);if(mod(jump,33)===4&&jump-n===4)leapJ+=1;leapG=div(gy,4)-div((div(gy,100)+1)*3,4)-150;march=20+leapJ-leapG;if(withoutLeap)return{gy,march};if(jump-n<6)n=n-jump+div(jump+4,33)*33;leap=mod(mod(n+1,33)-1,4);if(leap===-1)leap=4;return{leap,gy,march}}

function j2d(jy,jm,jd){let r=jalCal(jy,true);return g2d(r.gy,3,r.march)+(jm-1)*31-div(jm,7)*(jm-7)+jd-1}

<script>
/* DeutschWeg X legacy compatibility bridge.
   This classic script intentionally shares the global lexical environment with the legacy app,
   so modules can update the existing profile without exposing the whole state object. */
window.DeutschWegLegacyBridge = Object.freeze({
  getProfile(){
    try{return JSON.parse(JSON.stringify(state.profile||{}))}catch(e){return {}}
  },
  getSnapshot(){
    try{return JSON.parse(JSON.stringify({profile:state.profile||{},studySessions:state.studySessions||[],learning:state.learning||{},plan:state.plan||{},completed:state.completed||{},focusMinutes:state.focusMinutes||0}))}catch(e){return {}}
  },
  applyPlacementResult(result){
    try{if(!result||!result.level)return false;state.profile.currentLevel=result.level;state.profile.placementNeeded=result.level==='UNKNOWN';state.profile.placementSource=result.source||'placement-center';state.profile.placementCheckedAt=result.at||new Date().toISOString();save();renderAll();return true}catch(e){console.error('[DeutschWegX] placement bridge failed',e);return false}
  },
  addCustomVocab(item){
    try{state.learning.customVocab=Array.isArray(state.learning.customVocab)?state.learning.customVocab:[];state.learning.customVocab.push({id:item.id||('cv'+uid()),word:item.word||'',fa:item.fa||'',source:item.source||'Smart Dictionary',createdAt:item.createdAt||new Date().toISOString(),status:item.status||'learning',meta:item.meta||'',example:item.example||''});save(true);renderAll();return true}catch(e){console.error('[DeutschWegX] vocab bridge failed',e);return false}
  },
  recordStudySession(item){
    try{state.studySessions=Array.isArray(state.studySessions)?state.studySessions:[];state.studySessions.push({id:uid(),date:iso(new Date()),startedAt:new Date().toISOString(),endedAt:new Date().toISOString(),minutes:Number(item?.minutes||1),module:item?.module||'Andere',source:item?.source||'DeutschWegX'});save(true);renderAll();return true}catch(e){return false}
  },
  openPracticeTab(tab){try{state.ui.practiceTab=tab;save();go('practice');return true}catch(e){return false}},
  openMore(){try{go('more');return true}catch(e){return false}},
  setAdaptiveHint(analysis){try{state.learning.adaptiveX=analysis;save(true);renderAll();return true}catch(e){return false}}
});
</script>
